<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LORD NINE ボス出現時間</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>

        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #020617; color: #e2e8f0; font-family: sans-serif; overflow-x: hidden; touch-action: manipulation; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .modal-enter { animation: fadeIn 0.15s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        table { table-layout: fixed; width: 100%; }
        th, td { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyD8mUBp3fEmOCk0JdmpQaQjEBpor3UFnEk",
            authDomain: "lord-nine-timer.firebaseapp.com",
            projectId: "lord-nine-timer",
            storageBucket: "lord-nine-timer.firebasestorage.app",
            messagingSenderId: "219594241322",
            appId: "1:219594241322:web:208697256124c79e815a53"
        };
        const appId = "lord-nine-boss-timer";
        const STORAGE_KEY = "L9_BOSS_TIMER_DATA";

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const { useState, useEffect, useMemo, useRef } = React;
        const DAYS = ["日", "月", "火", "水", "木", "金", "土"];

        const IconClock = ({color="currentColor", size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{display:'inline'}}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconSword = ({size=14, color="#ef4444"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{display:'inline'}}><path d="M14.5 17.5 3 6V3h3l11.5 11.5"/><path d="M13 19l6-6"/><path d="M16 16l4 4"/><path d="M19 21l1-1"/></svg>;
        const IconMap = ({size=12, color="#475569"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{display:'inline'}}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const IconBell = ({size=18, active=false}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={active ? "#ef4444" : "#475569"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{display:'inline'}}><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>;

        const BOSS_DATA_RAW = [
            { lv: 60, name: "ベナトゥス", type: "interval", value: 10, area: "汚染された川筋", color: "red" },
            { lv: 65, name: "ビオレント", type: "interval", value: 10, area: "エラ小川", color: "red" },
            { lv: 70, name: "エゴ", type: "interval", value: 21, area: "奪還集結地", color: "red" },
            { lv: 70, name: "クレメンティス", type: "weekly", schedule: [{ day: 1, time: "12:30" }, { day: 4, time: "20:00" }], area: "白の魔女のゆりかご", color: "red" },
            { lv: 75, name: "リベラ", type: "interval", value: 24, area: "高い風の半島", color: "red" },
            { lv: 75, name: "アラネオ", type: "interval", value: 24, area: "ティリロサの墓地地下1階", color: "red" },
            { lv: 80, name: "アンドゥミエル", type: "interval", value: 24, area: "実験体研究室", color: "red" },
            { lv: 80, name: "サピルス", type: "weekly", schedule: [{ day: 0, time: "18:00" }, { day: 2, time: "12:30" }], area: "月光の束縛", color: "red" },
            { lv: 80, name: "ネウトロ", type: "weekly", schedule: [{ day: 2, time: "20:00" }, { day: 4, time: "12:30" }], area: "愛情の決戦", color: "red" },
            { lv: 85, name: "レディ・ダリア", type: "interval", value: 18, area: "血染めの陰", color: "red" },
            { lv: 85, name: "将軍アクレウス", type: "interval", value: 29, area: "ティリロサの墓地地下2階", color: "red" },
            { lv: 85, name: "テュメレ", type: "weekly", schedule: [{ day: 1, time: "20:00" }, { day: 3, time: "12:30" }], area: "暴走の痕跡", color: "red" },
            { lv: 88, name: "アメンティス", type: "interval", value: 29, area: "石灰岩の岬", color: "red" },
            { lv: 88, name: "ブラウドモア", type: "interval", value: 32, area: "蔓薔薇の橋", color: "red" },
            { lv: 90, name: "ミラベ", type: "weekly", schedule: [{ day: 6, time: "16:00" }], area: "ティリロサの墓地地下3階", color: "red" },
            { lv: 93, name: "ワニタス", type: "interval", value: 48, area: "罠の沼地", color: "red" },
            { lv: 93, name: "メトゥス", type: "interval", value: 48, area: "追従者の野原", color: "red" },
            { lv: 93, name: "デュプリカン", type: "interval", value: 48, area: "操り人形の玉座", color: "red" },
            { lv: 95, name: "シュライヤー", type: "interval", value: 35, area: "猟犬の仮面劇", color: "red" },
            { lv: 95, name: "リンゴル", type: "weekly", schedule: [{ day: 6, time: "18:00" }], area: "松明街道", color: "red" },
            { lv: 95, name: "ロデリック", type: "weekly", schedule: [{ day: 5, time: "20:00" }], area: "ガルバナ地下水路1階", color: "red" },
            { lv: 98, name: "ガレス", type: "interval", value: 32, area: "死者の大地第1区域", color: "red" },
            { lv: 98, name: "ティトル", type: "interval", value: 37, area: "死者の大地第2区域", color: "red" },
            { lv: 98, name: "ラルバ", type: "interval", value: 35, area: "ガルバナ干拓地", color: "red" },
            { lv: 100, name: "カテナ", type: "interval", value: 35, area: "死者の大地第3区域", color: "red" },
            { lv: 100, name: "アウラーク", type: "weekly", schedule: [{ day: 5, time: "23:00" }, { day: 3, time: "22:00" }], area: "ガルバナ地下水路2階", color: "red" },
            { lv: 100, name: "セクレタ", type: "interval", value: 62, area: "カリオンの墓", color: "red" },
            { lv: 100, name: "オルド", type: "interval", value: 62, area: "後継者の楽園", color: "red" },
            { lv: 100, name: "アスタ", type: "interval", value: 62, area: "黄金血の平原", color: "red" },
            { lv: 100, name: "スポル", type: "interval", value: 62, area: "黄金血の平原", color: "red" },
            { lv: 120, name: "シャイフロック", type: "weekly", schedule: [{ day: 6, time: "23:00" }], area: "カリオンの墓", color: "red" },
            { lv: 120, name: "ベンジー", type: "weekly", schedule: [{ day: 0, time: "22:00" }], area: "復讐の巣", color: "red" },
            { lv: 130, name: "リビティーナ", type: "weekly", schedule: [{ day: 1, time: "22:00" }, { day: 6, time: "22:00" }], area: "永遠なる従属の礼拝堂", color: "red" },
            { lv: 130, name: "ラカゼス", type: "weekly", schedule: [{ day: 2, time: "23:00" }, { day: 0, time: "20:00" }], area: "セクレタの刑罰", color: "red" },
            { lv: 135, name: "イカルシア", type: "weekly", schedule: [{ day: 2, time: "22:00" }, { day: 5, time: "22:00" }], area: "王家の谷", color: "red" },
            { lv: 135, name: "モティ", type: "weekly", schedule: [{ day: 3, time: "20:00" }, { day: 6, time: "20:00" }], area: "エブリンの外庭", color: "red" },
            { lv: 140, name: "ネバ", type: "weekly", schedule: [{ day: 0, time: "23:00" }], area: "セリンの中庭", color: "red" },
            { lv: 140, name: "トゥミエル", type: "weekly", schedule: [{ day: 0, time: "20:00" }], area: "ガルバナ地下水路3階", color: "red" },
            { lv: 60, name: "ラタン", type: "daily", times: ["12:00", "21:00"], area: "特殊出現", color: "purple" },
            { lv: 85, name: "パルト", type: "daily", times: ["12:00", "21:00"], area: "特殊出現", color: "purple" },
            { lv: 105, name: "ネドラ", type: "daily", times: ["12:00", "21:00"], area: "特殊出現", color: "purple" }
        ].map((b, i) => ({ ...b, originalIndex: i }));

        const formatToHHMM = (ts) => {
            if (!ts) return "";
            const d = new Date(ts);
            return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
        };

        const getNextWeeklyTime = (schedule) => {
            const now = new Date();
            const options = schedule.map(s => {
                let next = new Date();
                const [h, m] = s.time.split(':').map(Number);
                next.setHours(h, m, 0, 0);
                let dayDiff = s.day - now.getDay();
                if (dayDiff < 0 || (dayDiff === 0 && next < now)) dayDiff += 7;
                next.setDate(now.getDate() + dayDiff);
                return next.getTime();
            });
            return Math.min(...options);
        };

        const getNextDailyTime = (times) => {
            const now = new Date();
            const options = times.map(t => {
                let next = new Date();
                const [h, m] = t.split(':').map(Number);
                next.setHours(h, m, 0, 0);
                if (next < now) next.setDate(now.getDate() + 1);
                return next.getTime();
            });
            return Math.min(...options);
        };

        const formatCountdown = (ms) => {
            if (ms <= 0) return <span className="text-red-500 font-bold animate-pulse text-[10px]">出現中</span>;
            const totalSec = Math.floor(ms / 1000);
            const h = Math.floor(totalSec / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            return `${h}h ${m}m ${s}s`;
        };

        const formatPredictedTime = (ts) => {
            if (!ts) return "---";
            const d = new Date(ts);
            const now = new Date();
            const isDifferentDay = d.getDate() !== now.getDate() || d.getMonth() !== now.getMonth() || d.getFullYear() !== now.getFullYear();
            const hh = String(d.getHours()).padStart(2, '0');
            const mm = String(d.getMinutes()).padStart(2, '0');
            const timeStr = `${hh}:${mm}`;
            return isDifferentDay ? `${DAYS[d.getDay()]} ${timeStr}` : timeStr;
        };

        const parseTimeInputToTimestamp = (timeStr) => {
            if (!timeStr) return null;
            let clean = timeStr.replace(/\D/g, '');
            if (clean.length === 3) clean = '0' + clean;
            if (clean.length < 4) return null;
            const h = parseInt(clean.substring(0, 2));
            const m = parseInt(clean.substring(2, 4));
            if (h >= 24 || m >= 60) return null;
            const now = new Date();
            const d = new Date();
            d.setHours(h, m, 0, 0);
            if (d.getTime() > now.getTime()) d.setDate(d.getDate() - 1);
            return d.getTime();
        };

        function App() {
            const [history, setHistory] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                return saved ? JSON.parse(saved) : {};
            });
            const [searchTerm, setSearchTerm] = useState('');
            const [sortByTime, setSortByTime] = useState(false);
            const [topLvFilter, setTopLvFilter] = useState('ALL');
            const [now, setNow] = useState(Date.now());
            const [isOnline, setIsOnline] = useState(false);
            const [editingBoss, setEditingBoss] = useState(null); 
            const [notifiedEvents, setNotifiedEvents] = useState(new Set());
            const [isNotificationEnabled, setIsNotificationEnabled] = useState(false);

            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        await auth.signInAnonymously();
                        setIsOnline(true);
                        const path = `artifacts/${appId}/public/data/boss_status`;
                        return db.collection(path).onSnapshot(snapshot => {
                            const data = {};
                            snapshot.forEach(doc => { data[doc.id] = doc.data(); });
                            setHistory(prev => {
                                const newHistory = { ...prev, ...data };
                                localStorage.setItem(STORAGE_KEY, JSON.stringify(newHistory));
                                return newHistory;
                            });
                        }, () => setIsOnline(false));
                    } catch (e) { setIsOnline(false); }
                };
                initFirebase();
                const interval = setInterval(() => setNow(Date.now()), 1000);
                return () => clearInterval(interval);
            }, []);

            const headerTime = useMemo(() => {
                const d = new Date(now);
                return `${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;
            }, [now]);

            const processedBosses = useMemo(() => {
                return BOSS_DATA_RAW.map(boss => {
                    let nextSpawn = 0;
                    let displayLastKill = history[boss.name]?.lastKill || 0;

                    if (boss.type === 'interval') {
                        const intervalMs = boss.value * 3600 * 1000;
                        if (displayLastKill !== 0) {
                            while (displayLastKill + intervalMs < now) {
                                displayLastKill += intervalMs;
                            }
                            nextSpawn = displayLastKill + intervalMs;
                        }
                    } else if (boss.type === 'weekly') {
                        nextSpawn = getNextWeeklyTime(boss.schedule);
                    } else if (boss.type === 'daily') {
                        nextSpawn = getNextDailyTime(boss.times);
                    }
                    return { ...boss, nextSpawn, displayLastKill };
                });
            }, [history, now]);

            const top10SoonEvents = useMemo(() => {
                const events = [];
                const GRACE_PERIOD = 10 * 60 * 1000; // 10 minutes
                
                processedBosses.forEach(boss => {
                    if (boss.nextSpawn === 0) return;
                    if (!(topLvFilter === 'ALL' || (boss.lv >= 60 && boss.lv <= 100) || boss.name === 'ネドラ')) return;

                    if (boss.nextSpawn > now - GRACE_PERIOD) {
                        events.push({ ...boss, eventTime: boss.nextSpawn, label: "次" });
                    }
                    if (boss.type === 'interval') {
                        const intervalMs = boss.value * 3600 * 1000;
                        const secondSpawn = boss.nextSpawn + intervalMs;
                        if (secondSpawn > now - GRACE_PERIOD) {
                            events.push({ ...boss, eventTime: secondSpawn, label: "次々" });
                        }
                    }
                });

                return events.sort((a, b) => a.eventTime - b.eventTime).slice(0, 10);
            }, [processedBosses, topLvFilter, now]);

            useEffect(() => {
                if (!isNotificationEnabled) return;
                top10SoonEvents.forEach(event => {
                    const diff = event.eventTime - now;
                    const eventKey = `${event.name}-${event.eventTime}`;
                    if (diff > 290000 && diff < 310000 && !notifiedEvents.has(`${eventKey}-5m`)) {
                        sendNotification(`${event.name} 出現5分前！`, `${event.area} に向かってください。`);
                        setNotifiedEvents(prev => new Set(prev).add(`${eventKey}-5m`));
                    }
                });
            }, [now, top10SoonEvents, isNotificationEnabled]);

            const sendNotification = (title, body) => {
                if (Notification.permission === "granted") {
                    new Notification(title, { body, icon: "https://placehold.co/128x128/ef4444/ffffff?text=L9" });
                    try {
                        const synth = new Tone.Synth().toDestination();
                        synth.triggerAttackRelease("C4", "8n");
                    } catch (e) {}
                }
            };

            const toggleNotification = async () => {
                if (!isNotificationEnabled) {
                    const permission = await Notification.requestPermission();
                    if (permission === "granted") {
                        await Tone.start();
                        setIsNotificationEnabled(true);
                    }
                } else {
                    setIsNotificationEnabled(false);
                }
            };

            const handleSave = async () => {
                if (!editingBoss || editingBoss.type !== 'interval') return;
                const ts = parseTimeInputToTimestamp(editingBoss.tempTime);
                const bossName = editingBoss.name;
                setHistory(prev => ({ ...prev, [bossName]: { lastKill: ts || 0 } }));
                try {
                    await db.collection(`artifacts/${appId}/public/data/boss_status`).doc(bossName).set({ lastKill: ts || 0 }, { merge: true });
                } catch (e) { console.error(e); }
                setEditingBoss(null);
            };

            const displayBosses = useMemo(() => {
                return processedBosses
                    .filter(b => b.name.includes(searchTerm) || b.area.includes(searchTerm))
                    .sort((a, b) => sortByTime ? (a.nextSpawn - b.nextSpawn) : (a.originalIndex - b.originalIndex));
            }, [processedBosses, searchTerm, sortByTime]);

            return (
                <div className="min-h-screen p-2 md:p-6 pb-20 relative">
                    <div className="max-w-6xl mx-auto">
                        
                        {/* Header */}
                        <div className="flex flex-col md:flex-row justify-between items-center gap-4 mb-4 sticky top-0 bg-slate-950/95 py-2 z-30 shadow-md">
                            <div className="flex items-center justify-between w-full md:w-auto">
                                <div className="flex items-center gap-3">
                                    <h1 className="text-xl font-bold text-red-500 flex items-center gap-2">
                                        <IconClock size={24} /> LORD NINE
                                    </h1>
                                    <div className={`w-2 h-2 rounded-full ${isOnline ? 'bg-green-500' : 'bg-red-500 animate-pulse'}`}></div>
                                    <button onClick={toggleNotification} className="p-1 hover:bg-slate-800 rounded transition-colors">
                                        <IconBell active={isNotificationEnabled} />
                                    </button>
                                </div>
                                <div className="md:hidden text-2xl font-mono font-bold text-slate-100">{headerTime}</div>
                            </div>

                            <div className="flex items-center gap-2 w-full md:w-auto">
                                <input 
                                    type="text" placeholder="検索..." 
                                    className="bg-slate-900 border border-slate-800 rounded-lg py-2 px-4 w-full text-sm focus:outline-none focus:ring-1 focus:ring-red-500"
                                    value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}
                                />
                                <button 
                                    onClick={() => setSortByTime(!sortByTime)}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-lg text-xs font-bold border transition-all whitespace-nowrap ${sortByTime ? 'bg-red-600 border-red-500 text-white' : 'bg-slate-900 border-slate-700 text-slate-400'}`}
                                >
                                    {sortByTime ? "出現順" : "リスト順"}
                                </button>
                            </div>
                            <div className="hidden md:block text-3xl font-mono font-bold text-slate-100">{headerTime}</div>
                        </div>

                        {}
                        <div className="mb-8">
                            <div className="flex items-center justify-between mb-3 px-1">
                                <div className="flex items-center gap-2 text-slate-400">
                                    <IconClock size={16} />
                                    <h2 className="text-xs font-bold uppercase tracking-widest">直近 10 体 (出現予想)</h2>
                                </div>
                                <div className="flex gap-1 bg-slate-900 p-1 rounded-lg border border-slate-800">
                                    {['ALL', '60-100'].map(f => (
                                        <button key={f} onClick={() => setTopLvFilter(f)} className={`px-2 py-1 rounded text-[10px] font-bold ${topLvFilter === f ? 'bg-red-600 text-white' : 'text-slate-500'}`}>{f}</button>
                                    ))}
                                </div>
                            </div>
                            
                            <div className="overflow-x-auto bg-slate-900/60 rounded-xl border border-orange-900/30 shadow-xl scrollbar-hide">
                                <table className="w-full text-left border-collapse table-fixed">
                                    <thead className="bg-orange-950/20 border-b border-orange-900/20 text-orange-500/70 text-[10px] font-bold uppercase tracking-wider">
                                        <tr>
                                            <th className="px-2 py-2 w-[8%] text-center">No.</th>
                                            <th className="px-2 py-2 w-[35%]">名前 / Lv</th>
                                            <th className="px-2 py-2 w-[18%]">出現場所</th>
                                            <th className="px-2 py-2 w-[19%] text-center">予想時間</th>
                                            <th className="px-2 py-2 w-[20%] text-center">残り時間</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {top10SoonEvents.map((event, index) => {
                                            const diff = event.eventTime - now;
                                            const active = diff <= 0;
                                            return (
                                                <tr 
                                                    key={`top-${event.name}-${event.eventTime}`} 
                                                    onClick={() => setEditingBoss({ ...event, tempTime: formatToHHMM(event.displayLastKill) })}
                                                    className={`border-b border-slate-800/50 cursor-pointer transition-colors ${active ? 'bg-red-950/30' : 'hover:bg-slate-800/40'}`}
                                                >
                                                    <td className="px-2 py-3 text-[10px] font-mono font-bold text-orange-500/50 text-center">
                                                        {index + 1}
                                                    </td>
                                                    <td className="px-2 py-3">
                                                        <div className="flex flex-col">
                                                            <div className="flex items-center gap-1.5 overflow-hidden">
                                                                <span className="text-[9px] font-bold text-slate-500 flex-shrink-0">{event.label}</span>
                                                                <span className={`text-[10px] font-bold flex-shrink-0 ${event.color === 'purple' ? 'text-purple-400' : 'text-red-400'}`}>Lv.{event.lv}</span>
                                                                <span className="font-bold text-xs text-white truncate">{event.name}</span>
                                                            </div>
                                                        </div>
                                                    </td>
                                                    <td className="px-2 py-3">
                                                        <div className="text-[9px] text-slate-400 truncate">
                                                            <IconMap size={9} /> {event.area}
                                                        </div>
                                                    </td>
                                                    <td className="px-2 py-3 text-center">
                                                        <span className="text-sm font-mono font-bold text-orange-400">
                                                            {formatPredictedTime(event.eventTime)}
                                                        </span>
                                                    </td>
                                                    <td className="px-2 py-3 text-center font-mono font-bold text-[10px]">
                                                        {formatCountdown(diff)}
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {}
                        <div className="overflow-x-auto bg-slate-900 rounded-xl border border-slate-800 shadow-2xl mb-10 scrollbar-hide">
                            <table className="w-full text-left border-collapse table-fixed">
                                <thead className="bg-slate-950/50 border-b border-slate-800 text-slate-500 text-[10px] font-bold uppercase tracking-wider">
                                    <tr>
                                        <th className="px-2 py-2 w-[7%] text-center">No.</th>
                                        <th className="px-2 py-2 w-[35%]">名前 / Lv</th>
                                        <th className="px-2 py-2 w-[20%] text-center">討伐記録</th>
                                        <th className="px-2 py-2 w-[18%] text-center">予想時間</th>
                                        <th className="px-2 py-2 w-[20%] text-right">出現場所</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {displayBosses.map((boss, index) => {
                                        const diff = boss.nextSpawn - now;
                                        const active = boss.nextSpawn !== 0 && diff <= 0;
                                        const lastKillDisplay = boss.type === 'interval' ? (formatToHHMM(boss.displayLastKill) || "-----") : "-----";
                                        return (
                                            <tr key={boss.name} className={`border-b border-slate-800/50 hover:bg-slate-800/30 transition-colors ${active ? 'bg-red-950/20' : ''}`}>
                                                <td className="px-2 py-1.5 text-[9px] font-mono text-slate-600 text-center">
                                                    {sortByTime ? index + 1 : boss.originalIndex + 1}
                                                </td>
                                                <td className="px-2 py-1.5">
                                                    <div 
                                                        className="flex items-center gap-1.5 cursor-pointer overflow-hidden"
                                                        onClick={() => setEditingBoss({ ...boss, tempTime: formatToHHMM(boss.displayLastKill) })}
                                                    >
                                                        <span className={`text-[9px] px-1 rounded font-mono font-bold flex-shrink-0 ${boss.color === 'purple' ? 'bg-purple-500/20 text-purple-400' : 'bg-red-500/20 text-red-400'}`}>{boss.lv}</span>
                                                        <span className={`font-bold text-xs truncate ${active ? 'text-red-400' : 'text-slate-200'}`}>{boss.name}</span>
                                                    </div>
                                                </td>
                                                <td className="px-2 py-1.5 text-center">
                                                    <div 
                                                        onClick={() => setEditingBoss({ ...boss, tempTime: formatToHHMM(boss.displayLastKill) })} 
                                                        className="cursor-pointer hover:text-red-400 flex items-center justify-center gap-1 transition-colors"
                                                    >
                                                        <IconSword size={12} />
                                                        <span className="font-mono text-[10px] font-bold text-slate-400">{lastKillDisplay}</span>
                                                    </div>
                                                </td>
                                                <td className="px-2 py-1.5 text-center">
                                                    <span className={`text-[11px] font-mono font-bold ${active ? 'text-red-400' : 'text-slate-300'}`}>
                                                        {formatPredictedTime(boss.nextSpawn)}
                                                    </span>
                                                </td>
                                                <td className="px-2 py-1.5 text-right overflow-hidden">
                                                    <div className="flex items-center justify-end gap-1 text-[9px] text-slate-500 truncate">
                                                        <IconMap size={9} /> {boss.area}
                                                    </div>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {}
                    {editingBoss && (
                        <div className="fixed inset-0 z-[100] flex items-start justify-center p-4 pt-16 bg-black/80 backdrop-blur-sm modal-enter">
                            <div className="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl">
                                <div className="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-950/50">
                                    <h3 className="font-bold text-red-500 flex items-center gap-2">
                                        <IconSword size={16} /> {editingBoss.name}
                                    </h3>
                                    <button onClick={() => setEditingBoss(null)} className="text-slate-500 hover:text-white text-2xl transition-colors">&times;</button>
                                </div>
                                <div className="p-6">
                                    <div className="mb-4 flex items-center gap-2 text-slate-400 text-xs">
                                        <IconMap size={14} /> {editingBoss.area}
                                    </div>

                                    {editingBoss.type === 'interval' ? (
                                        <>
                                            <div className="mb-6 text-center">
                                                <label className="block text-[10px] text-slate-500 mb-2 uppercase font-bold">討伐時間 (HH:MM)</label>
                                                <input 
                                                    type="text" 
                                                    inputMode="numeric"
                                                    className="bg-slate-950 border-2 border-slate-700 focus:border-red-500 rounded-xl text-3xl font-mono text-center w-full py-4 text-slate-100 outline-none"
                                                    value={editingBoss.tempTime}
                                                    placeholder="00:00"
                                                    onChange={(e) => setEditingBoss(prev => ({ ...prev, tempTime: e.target.value }))}
                                                    onKeyDown={(e) => e.key === 'Enter' && handleSave()}
                                                    onFocus={(e) => e.target.select()}
                                                    autoFocus
                                                />
                                            </div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <button onClick={() => setEditingBoss(p => ({ ...p, tempTime: formatToHHMM(Date.now()) }))} className="bg-slate-800 text-slate-300 font-bold py-3 rounded-xl border border-slate-700 text-sm active:scale-95 transition-transform">現在時刻</button>
                                                <button onClick={handleSave} className="bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-xl shadow-lg text-sm active:scale-95 transition-transform">保存</button>
                                            </div>
                                        </>
                                    ) : (
                                        <div className="bg-slate-950/50 p-4 rounded-xl border border-slate-800">
                                            <div className="text-[10px] text-slate-500 uppercase font-bold mb-2">出現周期 / スケジュール</div>
                                            <div className="text-sm font-mono text-orange-400 space-y-1">
                                                {editingBoss.type === 'weekly' ? (
                                                    editingBoss.schedule.map((s, idx) => (
                                                        <div key={idx} className="flex justify-between border-b border-slate-800 pb-1 last:border-0">
                                                            <span>{DAYS[s.day]}曜日</span>
                                                            <span className="font-bold">{s.time}</span>
                                                        </div>
                                                    ))
                                                ) : (
                                                    editingBoss.times.map((t, idx) => (
                                                        <div key={idx} className="flex justify-between border-b border-slate-800 pb-1 last:border-0">
                                                            <span>毎日</span>
                                                            <span className="font-bold">{t}</span>
                                                        </div>
                                                    ))
                                                )}
                                            </div>
                                            <button onClick={() => setEditingBoss(null)} className="mt-6 w-full bg-slate-800 text-white font-bold py-3 rounded-xl text-sm">閉じる</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
