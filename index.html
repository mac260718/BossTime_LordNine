            { lv: 140, name: "ネバ", type: "weekly", schedule: [{ day: 0, time: "23:00" }], area: "セリンの中庭", color: "red" },
            { lv: 140, name: "トゥミエル", type: "weekly", schedule: [{ day: 0, time: "20:00" }], area: "ガルバナ地下水路3階", color: "red" },
            { lv: 60, name: "ラタン", type: "daily", times: ["12:00", "21:00"], area: "特殊出現", color: "purple" },
            { lv: 85, name: "パルト", type: "daily", times: ["12:00", "21:00"], area: "特殊出現", color: "purple" },

        ].map((b, i) => ({ ...b, originalIndex: i }));

        const formatToHHMM = (ts) => {
            if (!ts || ts === 0) return "";
            const d = new Date(ts);
            return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
        };

        const formatToMDHM = (ts) => {
            if (!ts || ts === 0) return "";
            const d = new Date(ts);
            return `${d.getMonth() + 1}/${d.getDate()} ${formatToHHMM(ts)}`;
        };

        const getNextWeeklyTime = (schedule) => {
            if (!schedule || schedule.length === 0) return 0;
            const now = new Date();
            const options = schedule.map(s => {
                let next = new Date();
                const [h, m] = s.time.split(':').map(Number);
                next.setHours(h, m, 0, 0);
                let dayDiff = s.day - now.getDay();
                if (dayDiff < 0 || (dayDiff === 0 && next < now)) dayDiff += 7;
                next.setDate(now.getDate() + dayDiff);
                return next.getTime();
            });
            return Math.min(...options);
        };

        const getNextDailyTime = (times) => {
            if (!times || times.length === 0) return 0;
            const now = new Date();
            const options = times.map(t => {
                let next = new Date();
                const [h, m] = t.split(':').map(Number);
                next.setHours(h, m, 0, 0);
                if (next < now) next.setDate(now.getDate() + 1);
                return next.getTime();
            });
            return Math.min(...options);
        };

        const formatCountdown = (ms, large = false) => {
            if (ms <= 0) return <span className="pulse-red font-bold text-xs md:text-sm px-2 py-0.5 rounded bg-red-500/10 border border-red-500/20">出現中</span>;
            const totalSec = Math.floor(ms / 1000);
            const h = Math.floor(totalSec / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            const colorClass = totalSec < 600 ? "text-red-500" : (totalSec < 1800 ? "text-orange-500" : "text-slate-400");
            const sizeClass = large ? "text-lg md:text-xl" : "text-[10px] md:text-[11px]";
            return (
                <div className={`font-mono font-bold ${sizeClass} px-1.5 py-0.5 rounded bg-slate-900/80 border border-slate-800 ${colorClass}`}>
                    {h}h {m}m {s}s
                </div>
            );
        };

        const formatHeaderCountdown = (ms) => {
            if (ms <= 0) return "出現中";
            const totalSec = Math.floor(ms / 1000);
            const h = Math.floor(totalSec / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            return `${String(h).padStart(2, '0')}時${String(m).padStart(2, '0')}分${String(s).padStart(2, '0')}秒`;
        };

        const formatPredictedTime = (ts) => {
            if (!ts) return "---";
            const d = new Date(ts);
            const now = new Date();
            const isDifferentDay = d.getDate() !== now.getDate() || d.getMonth() !== now.getMonth() || d.getFullYear() !== now.getFullYear();
            const hh = String(d.getHours()).padStart(2, '0');
            const mm = String(d.getMinutes()).padStart(2, '0');
            const timeStr = `${hh}:${mm}`;
            return isDifferentDay ? `${DAYS[d.getDay()]} ${timeStr}` : timeStr;
        };

        const parseTimeInputToTimestamp = (timeStr) => {
            if (!timeStr) return 0;
            let clean = timeStr.replace(/\D/g, '');
            if (clean.length === 3) clean = '0' + clean;
            if (clean.length !== 4) return 0;
            const h = parseInt(clean.substring(0, 2));
            const m = parseInt(clean.substring(2, 4));
            if (h >= 24 || m >= 60) return 0;
            const now = new Date();
            const d = new Date();
            d.setHours(h, m, 0, 0);
            if (d.getTime() > now.getTime()) d.setDate(d.getDate() - 1);
            return d.getTime();
        };

        function App() {
            const [history, setHistory] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                return saved ? JSON.parse(saved) : {};
            });
            const [topLvFilter, setTopLvFilter] = useState('ALL');
            const [mainSortMode, setMainSortMode] = useState('DEFAULT'); // DEFAULT, LEVEL, NAME, TIME
            const [now, setNow] = useState(Date.now());
            const [isOnline, setIsOnline] = useState(false);
            const [editingBoss, setEditingBoss] = useState(null); 

            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        await auth.signInAnonymously();
                        setIsOnline(true);
                        const path = `artifacts/${appId}/public/data/boss_status`;
                        return db.collection(path).onSnapshot(snapshot => {
                            const data = {};
                            snapshot.forEach(doc => { data[doc.id] = doc.data(); });
                            setHistory(prev => {
                                const newHistory = { ...prev, ...data };
                                localStorage.setItem(STORAGE_KEY, JSON.stringify(newHistory));
                                return newHistory;
                            });
                        }, () => setIsOnline(false));
                    } catch (e) { setIsOnline(false); }
                };
                initFirebase();
                const interval = setInterval(() => setNow(Date.now()), 1000);
                return () => clearInterval(interval);
            }, []);

            const processedBosses = useMemo(() => {
                return BOSS_DATA_RAW.map(boss => {
                    let nextSpawn = 0;
                    let docData = history[boss.name] || {};
                    let displayLastKill = docData.lastKill || 0;
                    let isAutoUpdated = false;
                    
                    let cycleValue = docData.customInterval || boss.value;
                    let weeklySchedule = docData.customWeeklySchedule || boss.schedule;
                    let dailyTimes = docData.customDailyTimes || boss.times;

                    if (boss.type === 'interval') {
                        const intervalMs = cycleValue * 3600 * 1000;
                        if (displayLastKill !== 0) {
                            let currentPredicted = displayLastKill + intervalMs;
                            while (now > currentPredicted + GRACE_PERIOD) {
                                displayLastKill += intervalMs;
                                currentPredicted = displayLastKill + intervalMs;
                                isAutoUpdated = true;
                            }
                            nextSpawn = currentPredicted;
                        }
                    } else if (boss.type === 'weekly') {
                        nextSpawn = getNextWeeklyTime(weeklySchedule);
                    } else if (boss.type === 'daily') {
                        nextSpawn = getNextDailyTime(dailyTimes);
                    }
                    return { ...boss, nextSpawn, displayLastKill, isAutoUpdated, currentCycle: cycleValue, currentWeeklySchedule: weeklySchedule, currentDailyTimes: dailyTimes, historyLog: docData.historyLog || [] };
                });
            }, [history, now]);

            const top10SoonEvents = useMemo(() => {
                const events = [];
                processedBosses.forEach(boss => {
                    if (boss.nextSpawn === 0) return;
                    if (boss.name !== 'ネドラ' && topLvFilter !== 'ALL' && !(boss.lv >= 60 && boss.lv <= 100)) return;

                    if (boss.nextSpawn > now - GRACE_PERIOD) {
                        events.push({ ...boss, eventTime: boss.nextSpawn });
                    }
                    if (boss.type === 'interval') {
                        const intervalMs = boss.currentCycle * 3600 * 1000;
                        const secondSpawn = boss.nextSpawn + intervalMs;
                        if (secondSpawn > now - GRACE_PERIOD) {
                            events.push({ ...boss, eventTime: secondSpawn });
                        }
                    }
                });
                return events.sort((a, b) => a.eventTime - b.eventTime).slice(0, 10);
            }, [processedBosses, topLvFilter, now]);

            const sortedMainList = useMemo(() => {
                const list = [...processedBosses];
                switch (mainSortMode) {
                    case 'LEVEL':
                        return list.sort((a, b) => a.lv - b.lv || a.originalIndex - b.originalIndex);
                    case 'NAME':
                        return list.sort((a, b) => a.name.localeCompare(b.name, 'ja') || a.originalIndex - b.originalIndex);
                    case 'TIME':
                        return list.sort((a, b) => {
                            if (a.nextSpawn === 0 && b.nextSpawn === 0) return a.originalIndex - b.originalIndex;
                            if (a.nextSpawn === 0) return 1;
                            if (b.nextSpawn === 0) return -1;
                            return a.nextSpawn - b.nextSpawn;
                        });
                    default:
                        return list.sort((a, b) => a.originalIndex - b.originalIndex);
                }
            }, [processedBosses, mainSortMode]);

            const globalMostRecent = useMemo(() => {
                const soonest = [...top10SoonEvents].filter(e => e.eventTime > now);
                return soonest.length > 0 ? soonest[0] : null;
            }, [top10SoonEvents, now]);

            const handleSaveRecord = async () => {
                if (!editingBoss) return;
                const bossName = editingBoss.name;
                const ts = parseTimeInputToTimestamp(editingBoss.tempTime);
                if (ts > 0) {
                    const currentLog = history[bossName]?.historyLog || [];
                    const newLog = [{ timestamp: ts, recordedAt: Date.now() }, ...currentLog].slice(0, 10);
                    const updateObj = { lastKill: ts, historyLog: newLog };
                    setHistory(prev => ({ ...prev, [bossName]: { ...prev[bossName], ...updateObj } }));
                    try { await db.collection(`artifacts/${appId}/public/data/boss_status`).doc(bossName).set(updateObj, { merge: true }); } catch (e) {}
                }
                setEditingBoss(null);
            };

            const handleSaveSettings = async () => {
                if (!editingBoss) return;
                const bossName = editingBoss.name;
                const updateObj = {};
                if (editingBoss.type === 'interval') {
                    const interval = parseFloat(editingBoss.tempInterval);
                    if (!isNaN(interval)) updateObj.customInterval = interval;
                } else if (editingBoss.type === 'weekly') {
                    updateObj.customWeeklySchedule = editingBoss.tempWeeklySchedule;
                } else if (editingBoss.type === 'daily') {
                    updateObj.customDailyTimes = editingBoss.tempDailyTimes;
                }
                if (Object.keys(updateObj).length > 0) {
                    setHistory(prev => ({ ...prev, [bossName]: { ...prev[bossName], ...updateObj } }));
                    try { await db.collection(`artifacts/${appId}/public/data/boss_status`).doc(bossName).set(updateObj, { merge: true }); } catch (e) {}
                }
                setEditingBoss(p => ({ ...p, view: 'record' }));
            };

            const handleDeleteHistory = async (idx) => {
                if (!editingBoss) return;
                const bossName = editingBoss.name;
                const newLog = [...editingBoss.historyLog];
                newLog.splice(idx, 1);
                const updateObj = { historyLog: newLog };
                setEditingBoss(p => ({ ...p, historyLog: newLog }));
                setHistory(prev => ({ ...prev, [bossName]: { ...prev[bossName], ...updateObj } }));
                try { await db.collection(`artifacts/${appId}/public/data/boss_status`).doc(bossName).update(updateObj); } catch (e) {}
            };

            const openEdit = (boss) => {
                setEditingBoss({
                    ...boss, 
                    view: 'record', 
                    tempTime: formatToHHMM(boss.displayLastKill),
                    tempInterval: boss.currentCycle,
                    tempWeeklySchedule: [...(boss.currentWeeklySchedule || [])],
                    tempDailyTimes: [...(boss.currentDailyTimes || [])],
                    historyLog: boss.historyLog || []
                });
            };

            return (
                <div className="min-h-screen p-2 md:p-6 pb-20 relative text-slate-200 font-sans tracking-tight">
                    <div className="max-w-6xl mx-auto">
                        
                        {/* Header */}
                        <div className="flex justify-between items-center mb-6 sticky top-0 bg-slate-950/95 py-2 z-30 shadow-md">
                            <div className="flex items-center gap-3">
                                <h1 className="text-xl font-bold text-red-500 flex items-center gap-2">
                                    <IconClock size={24} /> LORD NINE
                                </h1>
                                <div className={`w-2 h-2 rounded-full ${isOnline ? 'bg-green-500' : 'bg-red-500 animate-pulse'}`}></div>
                            </div>
                            <div className="flex flex-col items-end">
                                <div className="text-2xl md:text-3xl font-mono font-bold text-slate-100 leading-none">
                                    {new Date(now).getHours()}:{new Date(now).getMinutes().toString().padStart(2, '0')}
                                </div>
                                {globalMostRecent && (
                                    <div className="mt-1 flex items-center gap-1.5 bg-slate-900/50 px-2 py-0.5 rounded border border-slate-800/50">
                                        <span className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Next</span>
                                        <span className="text-[11px] font-mono font-bold text-red-400">
                                            {formatHeaderCountdown(globalMostRecent.eventTime - now)}
                                        </span>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Top 10 Table */}
                        <div className="mb-8">
                            <div className="flex items-center justify-between mb-3 px-1">
                                <div className="flex items-center gap-2 text-slate-400">
                                    <IconClock size={16} />
                                    <h2 className="text-xs font-bold uppercase tracking-widest">直近 10 体</h2>
                                </div>
                                <div className="flex gap-1 bg-slate-900 p-1 rounded-lg border border-slate-800">
                                    {['ALL', '60-100'].map(f => (
                                        <button key={f} onClick={() => setTopLvFilter(f)} className={`px-2 py-1 rounded text-[10px] font-bold ${topLvFilter === f ? 'bg-red-600 text-white' : 'text-slate-500'}`}>{f}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="bg-slate-900/60 rounded-xl border border-slate-800 shadow-xl overflow-x-auto">
                                <table className="w-full text-left border-collapse min-w-[340px] table-fixed">
                                    <thead className="bg-slate-950/50 border-b border-slate-800 text-slate-500 text-[10px] font-bold uppercase tracking-wider">
                                        <tr>
                                            <th className="px-2 py-2 w-[10%] text-center">No.</th>
                                            <th className="px-2 py-2 w-[45%]">名前 / Lv</th>
                                            <th className="px-2 py-2 w-[45%] text-center">予想時間</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {top10SoonEvents.map((event, index) => (
                                            <tr key={`top-${event.name}-${event.eventTime}`} onClick={() => openEdit(event)} className={`border-b border-slate-800/50 cursor-pointer transition-colors ${event.eventTime - now <= 0 ? 'bg-red-950/20' : 'hover:bg-slate-800/40'}`}>
                                                <td className="px-2 py-3 text-[11px] font-mono font-bold text-slate-600 text-center">{index + 1}</td>
                                                <td className="px-2 py-3">
                                                    <div className="flex items-center gap-1">
                                                        <span className={`text-[10px] font-bold ${event.color === 'purple' ? 'text-purple-400' : 'text-red-400'}`}>Lv.{event.lv}</span>
                                                        <span className="font-bold text-xs text-white truncate">{event.name}</span>
                                                    </div>
                                                </td>
                                                <td className="px-2 py-3 text-center">
                                                    <div className="flex flex-col items-center">
                                                        <span className="text-base font-mono font-bold text-orange-400 whitespace-nowrap">{formatPredictedTime(event.eventTime)}</span>
                                                        {event.isAutoUpdated && <span className="text-[9px] font-bold text-red-500 bg-red-500/10 px-1 rounded border border-red-500/20">自動更新</span>}
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* Main Boss List Section */}
                        <div className="mb-10">
                            <div className="flex items-center justify-between mb-3 px-1">
                                <div className="flex items-center gap-2 text-slate-400">
                                    <IconSort size={16} />
                                    <h2 className="text-xs font-bold uppercase tracking-widest">全ボスリスト</h2>
                                </div>
                                <div className="flex gap-1 bg-slate-900 p-1 rounded-lg border border-slate-800">
                                    {[
                                        { label: '標準', val: 'DEFAULT' },
                                        { label: 'レベル', val: 'LEVEL' },
                                        { label: '名前', val: 'NAME' },
                                        { label: '出現順', val: 'TIME' }
                                    ].map(s => (
                                        <button 
                                            key={s.val} 
                                            onClick={() => setMainSortMode(s.val)} 
                                            className={`px-2 py-1 rounded text-[10px] font-bold transition-colors ${mainSortMode === s.val ? 'bg-slate-700 text-white' : 'text-slate-500 hover:text-slate-300'}`}
                                        >
                                            {s.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="bg-slate-900 rounded-xl border border-slate-800 shadow-2xl overflow-hidden">
                                <table className="w-full text-left border-collapse table-fixed">
                                    <thead className="bg-slate-950/50 border-b border-slate-800 text-slate-500 text-[10px] font-bold uppercase tracking-wider">
                                        <tr>
                                            <th className="px-2 py-2 w-[10%] text-center">No.</th>
                                            <th className="px-2 py-2 w-[45%]">名前 / Lv</th>
                                            <th className="px-2 py-2 w-[45%] text-center">予想時間</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {sortedMainList.map((boss, index) => {
                                            const diff = boss.nextSpawn - now;
                                            return (
                                                <tr key={boss.name} onClick={() => openEdit(boss)} className={`border-b border-slate-800/50 hover:bg-slate-800/30 cursor-pointer transition-colors ${boss.nextSpawn !== 0 && diff <= 0 ? 'bg-red-950/20' : ''}`}>
                                                    <td className="px-2 py-2 text-[10px] font-mono text-slate-600 text-center">
                                                        {mainSortMode === 'DEFAULT' ? boss.originalIndex + 1 : index + 1}
                                                    </td>
                                                    <td className="px-2 py-2">
                                                        <div className="flex items-center gap-1.5">
                                                            <span className={`text-[9px] px-1 rounded font-mono font-bold ${boss.color === 'purple' ? 'bg-purple-500/20 text-purple-400' : 'bg-red-500/20 text-red-400'}`}>{boss.lv}</span>
                                                            <span className={`font-bold text-xs whitespace-nowrap ${boss.nextSpawn !== 0 && diff <= 0 ? 'text-red-400' : ''}`}>{boss.name}</span>
                                                        </div>
                                                    </td>
                                                    <td className="px-2 py-2 text-center">
                                                        <div className="flex items-center justify-center gap-2">
                                                            <span className={`text-sm font-mono font-bold ${boss.nextSpawn !== 0 && diff <= 0 ? 'text-red-400' : 'text-slate-400'}`}>{formatPredictedTime(boss.nextSpawn)}</span>
                                                            {boss.isAutoUpdated && <span className="text-[9px] font-bold text-red-500 bg-red-500/10 px-1 rounded border border-red-500/20 whitespace-nowrap">自動更新</span>}
                                                        </div>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {/* Interaction Modal */}
                    {editingBoss && (
                        <div className="fixed inset-0 z-[100] flex items-start justify-center p-4 bg-black/80 backdrop-blur-sm pt-12 modal-enter">
                            <div className="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-[340px] overflow-hidden shadow-2xl relative max-h-[85vh] flex flex-col">
                                {editingBoss.view === 'record' ? (
                                    <div className="flex flex-col overflow-hidden">
                                        <div className="p-4 border-b border-slate-800 bg-slate-950/50">
                                            <div className="flex items-center justify-between mb-1">
                                                <div className="flex items-center gap-1.5">
                                                    <span className="text-red-500 font-mono font-bold text-xs">Lv.{editingBoss.lv}</span>
                                                    <h3 className="font-bold text-white text-lg">{editingBoss.name}</h3>
                                                </div>
                                                <button onClick={() => setEditingBoss(p => ({ ...p, view: 'history' }))} className="p-1.5 text-slate-400 hover:text-slate-100 hover:bg-slate-800 rounded-lg transition-colors"><IconHistory size={20} /></button>
                                            </div>
                                            <div className="text-xs text-slate-400 flex items-center gap-1 mb-3"><IconMap size={12} color="#94a3b8" /> {editingBoss.area}</div>
                                            <div className="flex justify-between items-center">
                                                <div className="text-[10px] text-orange-500 font-bold bg-orange-500/10 px-2 py-1 rounded border border-orange-500/20 flex items-center gap-1.5 cursor-pointer hover:bg-orange-500/20 transition-all" onClick={() => setEditingBoss(p => ({ ...p, view: 'settings' }))}>設定 <IconSettings size={10} /></div>
                                                <div className="flex items-center gap-2">{editingBoss.isAutoUpdated && <span className="text-[9px] font-bold text-red-500 uppercase">Auto</span>}{formatCountdown((editingBoss.eventTime || editingBoss.nextSpawn) - now)}</div>
                                            </div>
                                        </div>
                                        <div className="p-4 overflow-y-auto scrollbar-hide">
                                            {editingBoss.type === 'interval' ? (
                                                <>
                                                    <div className="mb-4">
                                                        <label className="text-[10px] text-slate-500 font-bold mb-1 block uppercase tracking-widest">討伐時間 (HH:MM)</label>
                                                        <input type="text" inputMode="numeric" className="bg-slate-950 border-2 border-slate-700 focus:border-red-500 rounded-xl text-2xl font-mono text-center w-full py-2 text-slate-100 outline-none" value={editingBoss.tempTime} placeholder="00:00" onChange={(e) => { let val = e.target.value; if (val.length === 2 && !val.includes(':') && e.nativeEvent.inputType !== 'deleteContentBackward') val = val + ':'; setEditingBoss(prev => ({ ...prev, tempTime: val })); }} onKeyDown={(e) => e.key === 'Enter' && handleSaveRecord()} />
                                                    </div>
                                                    <div className="grid grid-cols-2 gap-2 mb-4">
                                                        <button onClick={() => setEditingBoss(p => ({ ...p, tempTime: formatToHHMM(Date.now()) }))} className="bg-slate-800 hover:bg-slate-700 text-slate-200 font-bold py-2.5 rounded-xl border border-slate-700 text-xs transition-colors">現在時刻</button>
                                                        <button onClick={handleSaveRecord} className="bg-red-600 hover:bg-red-500 text-white font-bold py-2.5 rounded-xl shadow-lg text-xs transition-colors">保存</button>
                                                    </div>
                                                </>
                                            ) : (
                                                <div className="mb-4 p-3 bg-slate-950/50 rounded-xl border border-slate-800 border-dashed text-center">
                                                    <div className="text-[10px] text-slate-500 font-bold uppercase mb-2 tracking-widest">出現スケジュール</div>
                                                    <div className="text-xs text-slate-400 leading-relaxed font-mono">{editingBoss.type === 'weekly' ? editingBoss.currentWeeklySchedule.map(s => `${DAYS[s.day]} ${s.time}`).join(', ') : editingBoss.currentDailyTimes.join(', ')}</div>
                                                </div>
                                            )}
                                            <button onClick={() => setEditingBoss(null)} className="w-full bg-[#1e293b] hover:bg-[#334155] text-white font-bold py-3 rounded-xl text-sm transition-colors border border-slate-700/50 shadow-inner">閉じる</button>
                                        </div>
                                    </div>
                                ) : editingBoss.view === 'history' ? (
                                    <div className="flex flex-col overflow-hidden h-full">
                                        <div className="p-4 border-b border-slate-800 bg-slate-900/50 flex-shrink-0 flex items-center gap-2"><IconHistory size={18} color="#94a3b8" /><h3 className="font-bold text-white text-base">更新履歴: {editingBoss.name}</h3></div>
                                        <div className="p-4 overflow-y-auto scrollbar-hide flex-grow">
                                            <div className="space-y-1 mb-6">
                                                {(!editingBoss.historyLog || editingBoss.historyLog.length === 0) ? (<div className="text-center py-10 text-slate-600 text-xs font-bold uppercase tracking-widest">記録なし</div>) : (
                                                    editingBoss.historyLog.map((log, i) => (
                                                        <div key={i} className="flex justify-between items-center bg-slate-950/50 p-3 rounded-lg border border-slate-800/50 group">
                                                            <div className="flex flex-col"><span className="text-[10px] text-slate-500 font-bold uppercase">討伐時間</span><span className="text-base font-mono font-bold text-orange-400">{formatToMDHM(log.timestamp)}</span></div>
                                                            <div className="flex items-center gap-3"><div className="text-right"><span className="text-[9px] text-slate-600 block">記録日時</span><span className="text-[10px] text-slate-400 font-mono">{formatToHHMM(log.recordedAt)}</span></div><button onClick={() => handleDeleteHistory(i)} className="p-2 text-slate-700 hover:text-red-500 bg-slate-900/50 hover:bg-red-500/10 rounded-lg transition-all"><IconTrash size={14} /></button></div>
                                                        </div>
                                                    ))
                                                )}
                                            </div>
                                            <button onClick={() => setEditingBoss(p => ({ ...p, view: 'record' }))} className="w-full bg-slate-800 hover:bg-slate-700 text-slate-200 font-bold py-3 rounded-xl border border-slate-700 text-xs transition-colors">戻る</button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex flex-col overflow-hidden max-h-full">
                                        <div className="p-4 border-b border-slate-800 bg-slate-900/50 flex-shrink-0 flex items-center gap-2"><IconSettings size={16} color="#f97316" /><h3 className="font-bold text-white text-base">出現設定: {editingBoss.name}</h3></div>
                                        <div className="p-4 overflow-y-auto scrollbar-hide">
                                            {editingBoss.type === 'interval' ? (
                                                <div className="mb-6"><label className="text-[10px] text-slate-500 font-bold mb-2 block uppercase tracking-wider">出現周期 (時間)</label><div className="relative"><input type="number" step="0.5" className="bg-slate-950 border-2 border-slate-800 focus:border-orange-500 rounded-xl text-xl font-mono text-center w-full py-3 text-orange-400 outline-none" value={editingBoss.tempInterval} onChange={(e) => setEditingBoss(p => ({ ...p, tempInterval: e.target.value }))} /><span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-600 font-bold text-sm">h</span></div></div>
                                            ) : editingBoss.type === 'weekly' ? (
                                                <div className="mb-6"><label className="text-[10px] text-slate-500 font-bold mb-2 block uppercase tracking-wider">週間スケジュール</label>
                                                    <div className="space-y-2">{editingBoss.tempWeeklySchedule.map((slot, i) => (
                                                        <div key={i} className="flex gap-1 items-center bg-slate-950 p-2 rounded-lg border border-slate-800"><select className="bg-slate-900 text-xs px-1 py-1 rounded border border-slate-700 outline-none flex-grow" value={slot.day} onChange={(e) => setEditingBoss(p => ({ ...p, tempWeeklySchedule: p.tempWeeklySchedule.map((s, idx) => idx === i ? { ...s, day: parseInt(e.target.value) } : s) }))}>{DAYS.map((d, di) => <option key={di} value={di}>{d}</option>)}</select><input type="text" className="bg-slate-900 text-xs px-2 py-1 rounded border border-slate-700 w-20 font-mono outline-none" value={slot.time} onChange={(e) => setEditingBoss(p => ({ ...p, tempWeeklySchedule: p.tempWeeklySchedule.map((s, idx) => idx === i ? { ...s, time: e.target.value } : s) }))} /><button onClick={() => setEditingBoss(p => ({ ...p, tempWeeklySchedule: p.tempWeeklySchedule.filter((_, idx) => idx !== i) }))} className="p-1.5 text-slate-600 hover:text-red-500 transition-colors"><IconTrash size={12}/></button></div>
                                                    ))}<button onClick={() => setEditingBoss(p => ({ ...p, tempWeeklySchedule: [...p.tempWeeklySchedule, { day: 0, time: "00:00" }] }))} className="w-full py-2 border border-dashed border-slate-700 rounded-lg text-[10px] font-bold text-slate-500 hover:bg-slate-800 transition-colors flex items-center justify-center gap-1"><IconPlus size={10} /> スケジュール追加</button></div>
                                                </div>
                                            ) : (
                                                <div className="mb-6"><label className="text-[10px] text-slate-500 font-bold mb-2 block uppercase tracking-wider">日間スケジュール (時間)</label>
                                                    <div className="space-y-2">{editingBoss.tempDailyTimes.map((time, i) => (
                                                        <div key={i} className="flex gap-1 items-center bg-slate-950 p-2 rounded-lg border border-slate-800"><input type="text" className="bg-slate-900 text-xs px-2 py-1 rounded border border-slate-700 w-full font-mono outline-none text-center" value={time} onChange={(e) => setEditingBoss(p => ({ ...p, tempDailyTimes: p.tempDailyTimes.map((t, idx) => idx === i ? e.target.value : t) }))} /><button onClick={() => setEditingBoss(p => ({ ...p, tempDailyTimes: p.tempDailyTimes.filter((_, idx) => idx !== i) }))} className="p-1.5 text-slate-600 hover:text-red-500 transition-colors"><IconTrash size={12}/></button></div>
                                                    ))}<button onClick={() => setEditingBoss(p => ({ ...p, tempDailyTimes: [...p.tempDailyTimes, "00:00"] }))} className="w-full py-2 border border-dashed border-slate-700 rounded-lg text-[10px] font-bold text-slate-500 hover:bg-slate-800 transition-colors flex items-center justify-center gap-1"><IconPlus size={10} /> 時間を追加</button></div>
                                                </div>
                                            )}
                                            <div className="grid grid-cols-2 gap-2 mt-4 flex-shrink-0"><button onClick={() => setEditingBoss(p => ({ ...p, view: 'record' }))} className="bg-slate-800 hover:bg-slate-700 text-slate-200 font-bold py-3 rounded-xl border border-slate-700 text-xs transition-colors">戻る</button><button onClick={handleSaveSettings} className="bg-orange-600 hover:bg-orange-500 text-white font-bold py-3 rounded-xl shadow-lg text-xs transition-colors active:scale-95">保存</button></div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
