<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="L9ボス時間">
    <link rel="apple-touch-icon" href="https://placehold.co/192x192/ef4444/ffffff?text=L9">
    <title>LORD NINE ボス出現時間</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #020617; color: #e2e8f0; font-family: sans-serif; overflow-x: hidden; touch-action: manipulation; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .modal-enter { animation: fadeIn 0.15s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyD8mUBp3fEmOCk0JdmpQaQjEBpor3UFnEk",
            authDomain: "lord-nine-timer.firebaseapp.com",
            projectId: "lord-nine-timer",
            storageBucket: "lord-nine-timer.firebasestorage.app",
            messagingSenderId: "219594241322",
            appId: "1:219594241322:web:208697256124c79e815a53"
        };
        const appId = "lord-nine-boss-timer";
        const STORAGE_KEY = "L9_BOSS_TIMER_DATA";

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const { useState, useEffect, useMemo, useRef } = React;
        const DAYS = ["日", "月", "火", "水", "木", "金", "土"];

        const IconClock = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconSword = ({size=14}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 17.5 3 6V3h3l11.5 11.5"/><path d="M13 19l6-6"/><path d="M16 16l4 4"/><path d="M19 21l1-1"/></svg>;
        const IconBell = ({active}) => <svg width="20" height="20" viewBox="0 0 24 24" fill={active ? "#ef4444" : "none"} stroke={active ? "#ef4444" : "currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>;
        const IconMap = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;

        const BOSS_DATA_RAW = [
            { lv: 60, name: "ベナトゥス", type: "interval", value: 10, area: "汚染された川筋" },
            { lv: 65, name: "ビオレント", type: "interval", value: 10, area: "エラ小川" },
            { lv: 70, name: "エゴ", type: "interval", value: 21, area: "奪還集結地" },
            { lv: 70, name: "クレメンティス", type: "weekly", schedule: [{ day: 1, time: "12:30" }, { day: 4, time: "20:00" }], area: "白の魔女のゆりかご" },
            { lv: 75, name: "リベラ", type: "interval", value: 24, area: "黒い嵐の半島" },
            { lv: 75, name: "アラネオ", type: "interval", value: 24, area: "ティリロサの墓地地下1階" },
            { lv: 80, name: "アンドゥミエル", type: "interval", value: 24, area: "実験体研究室" },
            { lv: 80, name: "サピルス", type: "weekly", schedule: [{ day: 0, time: "18:00" }, { day: 2, time: "12:30" }], area: "月光の束縛" },
            { lv: 80, name: "ネウトロ", type: "weekly", schedule: [{ day: 2, time: "20:00" }, { day: 4, time: "12:30" }], area: "愛情の決戦" },
            { lv: 85, name: "レディ・ダリア", type: "interval", value: 18, area: "血染めの陰" },
            { lv: 85, name: "将軍アクレウス", type: "interval", value: 29, area: "ティリロサの墓地地下2階" },
            { lv: 85, name: "テュメレ", type: "weekly", schedule: [{ day: 1, time: "20:00" }, { day: 3, time: "12:30" }], area: "暴走の痕跡" },
            { lv: 88, name: "アメンティス", type: "interval", value: 29, area: "石灰岩の岬" },
            { lv: 88, name: "ブラウドモア", type: "interval", value: 32, area: "蔓薔薇の橋" },
            { lv: 90, name: "ミラベ", type: "weekly", schedule: [{ day: 6, time: "16:00" }], area: "ティリロサの墓地地下3階" },
            { lv: 93, name: "ワニタス", type: "interval", value: 48, area: "罠の沼地" },
            { lv: 93, name: "メトゥス", type: "interval", value: 48, area: "追従者の野原" },
            { lv: 93, name: "デュプリカン", type: "interval", value: 48, area: "操り人形の玉座" },
            { lv: 95, name: "シュライヤー", type: "interval", value: 35, area: "猟犬の仮面劇" },
            { lv: 95, name: "リンゴル", type: "weekly", schedule: [{ day: 6, time: "18:00" }], area: "松明街道" },
            { lv: 95, name: "ロデリック", type: "weekly", schedule: [{ day: 5, time: "20:00" }], area: "ガルバナ地下水路1階" },
            { lv: 98, name: "ガレス", type: "interval", value: 32, area: "死者の大地第1区域" },
            { lv: 98, name: "ティトル", type: "interval", value: 37, area: "死者の大地第2区域" },
            { lv: 98, name: "ラルバ", type: "interval", value: 35, area: "ガルバナ干拓地" },
            { lv: 100, name: "カテナ", type: "interval", value: 35, area: "死者の大地第3区域" },
            { lv: 100, name: "アウラーク", type: "weekly", schedule: [{ day: 5, time: "23:00" }, { day: 3, time: "22:00" }], area: "ガルバナ地下水路2階" },
            { lv: 100, name: "セクレタ", type: "interval", value: 62, area: "カリオンの墓" },
            { lv: 100, name: "オルド", type: "interval", value: 62, area: "後継者の楽園" },
            { lv: 100, name: "アスタ", type: "interval", value: 62, area: "黄金血の平原" },
            { lv: 100, name: "スポル", type: "interval", value: 62, area: "黄金血の平原" },
            { lv: 120, name: "シャイフロック", type: "weekly", schedule: [{ day: 6, time: "23:00" }], area: "カリオンの墓" },
            { lv: 120, name: "ベンジー", type: "weekly", schedule: [{ day: 0, time: "22:00" }], area: "復讐の巣" },
            { lv: 130, name: "リビティーナ", type: "weekly", schedule: [{ day: 1, time: "22:00" }, { day: 6, time: "22:00" }], area: "永遠なる従属の礼拝堂" },
            { lv: 130, name: "ラカゼス", type: "weekly", schedule: [{ day: 2, time: "23:00" }, { day: 0, time: "20:00" }], area: "セクレタの刑罰" },
            { lv: 135, name: "イカルシア", type: "weekly", schedule: [{ day: 2, time: "22:00" }, { day: 5, time: "22:00" }], area: "王家の谷" },
            { lv: 135, name: "モティ", type: "weekly", schedule: [{ day: 3, time: "20:00" }, { day: 6, time: "20:00" }], area: "エブリンの外庭" },
            { lv: 140, name: "ネバ", type: "weekly", schedule: [{ day: 0, time: "23:00" }], area: "セリンの中庭" },
            { lv: 140, name: "トゥミエル", type: "weekly", schedule: [{ day: 0, time: "20:00" }], area: "ガルバナ地下水路3階" },
            { lv: 60, name: "ラタン", type: "daily", times: ["12:00", "21:00"], area: "特殊出現" },
            { lv: 85, name: "パルト", type: "daily", times: ["12:00", "21:00"], area: "特殊出現" },
            { lv: 105, name: "ネドラ", type: "daily", times: ["12:00", "21:00"], area: "特殊出現" }
        ].map((b, i) => ({ ...b, originalIndex: i }));

        const formatToHHMM = (ts) => {
            if (!ts) return "";
            const d = new Date(ts);
            return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        };

        const getNextWeeklyTime = (schedule) => {
            const now = new Date();
            const options = schedule.map(s => {
                let next = new Date();
                const [h, m] = s.time.split(':').map(Number);
                next.setHours(h, m, 0, 0);
                let dayDiff = s.day - now.getDay();
                if (dayDiff < 0 || (dayDiff === 0 && next < now)) dayDiff += 7;
                next.setDate(now.getDate() + dayDiff);
                return next.getTime();
            });
            return Math.min(...options);
        };

        const getNextDailyTime = (times) => {
            const now = new Date();
            const options = times.map(t => {
                let next = new Date();
                const [h, m] = t.split(':').map(Number);
                next.setHours(h, m, 0, 0);
                if (next < now) next.setDate(now.getDate() + 1);
                return next.getTime();
            });
            return Math.min(...options);
        };

        const formatCountdown = (ms) => {
            if (ms <= 0) return <span className="text-red-500 font-bold animate-pulse">出現中</span>;
            const totalSec = Math.floor(ms / 1000);
            const h = Math.floor(totalSec / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            return `${h}h ${m}m ${s}s`;
        };

        const formatPredictedTime = (ts) => {
            if (!ts) return "---";
            const d = new Date(ts);
            const now = new Date();
            const isDifferentDay = d.getDate() !== now.getDate();
            const timeStr = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
            return isDifferentDay ? `${DAYS[d.getDay()]} ${timeStr}` : timeStr;
        };

        function App() {
            const [history, setHistory] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                return saved ? JSON.parse(saved) : {};
            });
            const [now, setNow] = useState(Date.now());
            const [searchTerm, setSearchTerm] = useState('');
            const [topLvFilter, setTopLvFilter] = useState('ALL');
            const [editingBoss, setEditingBoss] = useState(null);
            const [notifiedEvents, setNotifiedEvents] = useState(new Set());
            const [isNotifyEnabled, setIsNotifyEnabled] = useState(Notification.permission === 'granted');

            useEffect(() => {
                auth.signInAnonymously().catch(() => {});
                const path = `artifacts/${appId}/public/data/boss_status`;
                const unsub = db.collection(path).onSnapshot(snapshot => {
                    const data = {};
                    snapshot.forEach(doc => { data[doc.id] = doc.data(); });
                    setHistory(prev => {
                        const next = { ...prev, ...data };
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
                        return next;
                    });
                });
                const timer = setInterval(() => setNow(Date.now()), 1000);
                return () => { unsub(); clearInterval(timer); };
            }, []);

            const requestNotify = () => {
                Notification.requestPermission().then(permission => {
                    setIsNotifyEnabled(permission === 'granted');
                });
            };

            const sendNotification = (title, body) => {
                if (Notification.permission === 'granted') {
                    new Notification(title, { body, icon: 'https://placehold.co/128x128/ef4444/ffffff?text=L9' });
                }
            };

            const processedBosses = useMemo(() => {
                return BOSS_DATA_RAW.map(boss => {
                    let nextSpawn = 0;
                    let displayLastKill = history[boss.name]?.lastKill || 0;
                    if (boss.type === 'interval') {
                        const intervalMs = boss.value * 3600 * 1000;
                        if (displayLastKill !== 0) {
                            while (displayLastKill + intervalMs < now) displayLastKill += intervalMs;
                            nextSpawn = displayLastKill + intervalMs;
                        }
                    } else if (boss.type === 'weekly') nextSpawn = getNextWeeklyTime(boss.schedule);
                    else if (boss.type === 'daily') nextSpawn = getNextDailyTime(boss.times);
                    return { ...boss, nextSpawn, displayLastKill };
                });
            }, [history, now]);

            const top10 = useMemo(() => {
                const events = [];
                processedBosses.forEach(boss => {
                    if (boss.nextSpawn === 0) return;
                    if (topLvFilter === '60-100' && boss.lv > 100 && boss.name !== 'ネドラ') return;
                    events.push({ ...boss, eventTime: boss.nextSpawn, label: "次" });
                    if (boss.type === 'interval') {
                        events.push({ ...boss, eventTime: boss.nextSpawn + (boss.value * 3600 * 1000), label: "次々" });
                    }
                });
                return events.sort((a, b) => a.eventTime - b.eventTime).slice(0, 10);
            }, [processedBosses, topLvFilter]);

            useEffect(() => {
                top10.forEach(event => {
                    const diffMin = (event.eventTime - now) / 60000;
                    const key5m = `${event.name}-${event.eventTime}-5m`;
                    const keyNow = `${event.name}-${event.eventTime}-now`;

                    if (diffMin <= 5 && diffMin > 4.8 && !notifiedEvents.has(key5m)) {
                        sendNotification("ボス出現5分前", `${event.name} がまもなく出現します (${event.area})`);
                        setNotifiedEvents(prev => new Set(prev).add(key5m));
                    }
                    if (diffMin <= 0 && diffMin > -0.2 && !notifiedEvents.has(keyNow)) {
                        sendNotification("ボス出現", `${event.name} が出現しました！`);
                        setNotifiedEvents(prev => new Set(prev).add(keyNow));
                    }
                });
            }, [top10, now]);

            const handleSave = async () => {
                if (!editingBoss) return;
                let ts = 0;
                if (editingBoss.tempTime) {
                    const [h, m] = editingBoss.tempTime.replace(/\D/g,'').match(/.{2}/g).map(Number);
                    const d = new Date(); d.setHours(h, m, 0, 0);
                    if (d > now) d.setDate(d.getDate() - 1);
                    ts = d.getTime();
                }
                const path = `artifacts/${appId}/public/data/boss_status`;
                await db.collection(path).doc(editingBoss.name).set({ lastKill: ts }, { merge: true });
                setEditingBoss(null);
            };

            return (
                <div className="min-h-screen p-2 md:p-6 pb-20">
                    <div className="max-w-6xl mx-auto">
                        <div className="flex justify-between items-center mb-6 sticky top-0 bg-slate-950/90 py-2 z-40">
                            <div className="flex items-center gap-4">
                                <h1 className="text-xl font-bold text-red-500">LORD NINE</h1>
                                <button onClick={requestNotify} className="p-2 bg-slate-900 rounded-full border border-slate-700">
                                    <IconBell active={isNotifyEnabled} />
                                </button>
                            </div>
                            <div className="text-2xl font-mono font-bold text-slate-100">{formatToHHMM(now)}</div>
                        </div>

                        {/* Top 10 Row */}
                        <div className="mb-8">
                            <div className="flex justify-between items-center mb-3">
                                <h2 className="text-xs font-bold text-slate-400 uppercase tracking-widest">直近 10 体</h2>
                                <div className="flex bg-slate-900 p-1 rounded-lg">
                                    {['ALL', '60-100'].map(f => (
                                        <button key={f} onClick={() => setTopLvFilter(f)} className={`px-3 py-1 rounded text-[10px] font-bold ${topLvFilter === f ? 'bg-red-600 text-white' : 'text-slate-500'}`}>{f}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="flex gap-3 overflow-x-auto pb-4 snap-x scrollbar-hide -mx-2 px-2">
                                {top10.map((ev, i) => (
                                    <div key={i} onClick={() => ev.type === 'interval' && setEditingBoss({name:ev.name, tempTime: formatToHHMM(ev.displayLastKill)})} className={`flex-none w-44 snap-start p-3 rounded-xl border relative ${ev.eventTime <= now ? 'bg-red-950/40 border-red-500 animate-pulse' : 'bg-slate-900 border-slate-800'}`}>
                                        <div className="flex justify-between items-start mb-2">
                                            <span className="text-[10px] bg-slate-800 px-1.5 rounded font-bold text-slate-400">{ev.label}</span>
                                            <span className="text-[10px] font-bold text-red-400">Lv.{ev.lv}</span>
                                        </div>
                                        <div className="font-bold text-sm truncate mb-1">{ev.name}</div>
                                        <div className="text-xl font-mono font-bold text-white mb-1">{formatPredictedTime(ev.eventTime)}</div>
                                        <div className="text-[10px] text-slate-400 flex items-center gap-1 mb-2">
                                            <IconClock size={10} /> {formatCountdown(ev.eventTime - now)}
                                        </div>
                                        <div className="text-[9px] text-slate-500 truncate flex items-center gap-1">
                                            <IconMap /> {ev.area}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Table */}
                        <div className="bg-slate-900 rounded-xl border border-slate-800 overflow-hidden shadow-2xl">
                            <table className="w-full text-left border-collapse">
                                <thead className="bg-slate-950/50 text-slate-500 text-[10px] font-bold uppercase">
                                    <tr>
                                        <th className="p-3">名前</th>
                                        <th className="p-3 text-center">記録</th>
                                        <th className="p-3 text-center">予想</th>
                                        <th className="p-3 text-right">場所</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {processedBosses.filter(b => b.name.includes(searchTerm)).map(boss => {
                                        const diff = boss.nextSpawn - now;
                                        return (
                                            <tr key={boss.name} className="border-t border-slate-800/50 hover:bg-slate-800/20 transition-colors">
                                                <td className="p-2">
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-[9px] font-bold text-slate-500 w-5">Lv.{boss.lv}</span>
                                                        <span className="font-bold text-sm">{boss.name}</span>
                                                    </div>
                                                </td>
                                                <td className="p-2 text-center">
                                                    {boss.type === 'interval' ? (
                                                        <div onClick={() => setEditingBoss({name:boss.name, tempTime:formatToHHMM(boss.displayLastKill)})} className="cursor-pointer text-xs font-mono text-slate-400 hover:text-red-400">
                                                            <IconSword /> {formatToHHMM(boss.displayLastKill) || "-----"}
                                                        </div>
                                                    ) : <span className="text-[10px] text-slate-600">定時</span>}
                                                </td>
                                                <td className="p-2 text-center text-sm font-mono font-bold text-slate-200">
                                                    {formatPredictedTime(boss.nextSpawn)}
                                                </td>
                                                <td className="p-2 text-right text-[10px] text-slate-500">{boss.area}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Modal */}
                    {editingBoss && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm modal-enter">
                            <div className="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-xs p-6 shadow-2xl">
                                <h3 className="font-bold text-red-500 mb-4">{editingBoss.name} 討伐記録</h3>
                                <input 
                                    type="text" inputMode="numeric" 
                                    className="bg-slate-950 border-2 border-slate-700 focus:border-red-500 rounded-xl text-3xl font-mono text-center w-full py-4 text-white outline-none mb-4"
                                    value={editingBoss.tempTime} placeholder="00:00" autoFocus
                                    onChange={e => setEditingBoss({...editingBoss, tempTime: e.target.value})}
                                    onKeyDown={e => e.key === 'Enter' && handleSave()}
                                />
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => setEditingBoss(null)} className="py-2 bg-slate-800 rounded-xl text-sm font-bold text-slate-400">閉じる</button>
                                    <button onClick={handleSave} className="py-2 bg-red-600 rounded-xl text-sm font-bold text-white shadow-lg shadow-red-600/20">保存</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        const swCode = `
            self.addEventListener('install', (event) => self.skipWaiting());
            self.addEventListener('activate', (event) => event.waitUntil(self.clients.claim()));
            self.addEventListener('push', (event) => {
                const data = event.data.json();
                self.registration.showNotification(data.title, { body: data.body, icon: data.icon });
            });
        `;
        const blob = new Blob([swCode], { type: 'text/javascript' });
        const swUrl = URL.createObjectURL(blob);
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(swUrl).catch(() => {});
        }
    </script>
</body>
</html>
