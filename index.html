        const isPlainObject = (value) => value !== null && typeof value === 'object' && !Array.isArray(value);

        const normalizeClockInput = (value) => {
            const normalized = String(value || '').normalize('NFKC').trim();
            const strictMatch = normalized.match(/^([01]?\d|2[0-3]):([0-5]\d)$/);
            if (strictMatch) {
                return `${strictMatch[1].padStart(2, '0')}:${strictMatch[2]}`;
            }
            let digits = normalized.replace(/\D/g, '');
            if (digits.length === 3) digits = `0${digits}`;
            if (digits.length === 4) {
                const h = parseInt(digits.slice(0, 2), 10);
                const m = parseInt(digits.slice(2), 10);
                if (h < 24 && m < 60) {
                    return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
                }
            }
            return "";
        };

        const validateDailyTimes = (times) => {
            if (!Array.isArray(times) || times.length === 0) {
                return { valid: false, message: "出現時間を1つ以上入力してください。" };
            }
            const normalized = times.map(normalizeClockInput);
            if (normalized.some(time => !time)) {
                return { valid: false, message: "時間は 00:00 から 23:59 の形式で入力してください。" };
            }
            return { valid: true, value: [...new Set(normalized)] };
        };

        const parseDailyTimesInput = (value) => String(value || '').normalize('NFKC').split(/[,\s、，]+/).map(time => time.trim()).filter(Boolean);

        const validateWeeklySchedule = (schedule) => {
            if (!Array.isArray(schedule) || schedule.length === 0) {
                return { valid: false, message: "週間スケジュールを1つ以上入力してください。" };
            }
            const normalized = [];
            for (const slot of schedule) {
                const day = Number(slot?.day);
                const time = normalizeClockInput(slot?.time);
                if (!Number.isInteger(day) || day < 0 || day > 6 || !time) {
                    return { valid: false, message: "曜日と時間を正しく入力してください。" };
                }
                normalized.push({ day, time });
            }
            return { valid: true, value: normalized };
        };

        const sanitizeHistoryLog = (logs) => {
            if (!Array.isArray(logs)) return [];
            return logs.map(log => {
                if (!isPlainObject(log)) return null;
                const timestamp = Number(log.timestamp);
                const recordedAt = Number(log.recordedAt);
                if (!Number.isFinite(timestamp) || timestamp <= 0) return null;
                return {
                    timestamp,
                    recordedAt: Number.isFinite(recordedAt) && recordedAt > 0 ? recordedAt : timestamp,
                    ...(log.isMaint ? { isMaint: true } : {})
                };
            }).filter(Boolean).slice(0, 10);
        };

            const customInterval = Number(status.customInterval);
            if (Number.isFinite(lastKill) && lastKill >= 0) clean.lastKill = lastKill;
            if (Array.isArray(status.historyLog)) clean.historyLog = sanitizeHistoryLog(status.historyLog);
            if (Number.isFinite(customInterval) && customInterval > 0) clean.customInterval = customInterval;

            const weekly = validateWeeklySchedule(status.customWeeklySchedule);
            const daily = validateDailyTimes(status.customDailyTimes);
            if (weekly.valid) clean.customWeeklySchedule = weekly.value;
            if (daily.valid) clean.customDailyTimes = daily.value;
            return clean;
        };

        const sanitizeHistoryMap = (raw) => {
            if (!isPlainObject(raw)) return {};
            return Object.entries(raw).reduce((acc, [bossName, status]) => {
                const cleanName = clampText(bossName, 40);
                if (cleanName) acc[cleanName] = sanitizeBossStatus(status);
                return acc;
            }, {});
        };

        const readSavedHistory = () => {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (!saved) return {};
                return sanitizeHistoryMap(JSON.parse(saved));
            } catch (e) {
                console.warn("Saved boss timer data was reset because it could not be parsed.", e);
                localStorage.removeItem(STORAGE_KEY);
                return {};
            }
        };

        const persistHistory = (nextHistory) => {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(nextHistory));
                return true;
            } catch (e) {
                console.warn("Could not persist boss timer data to localStorage.", e);
                return false;
            }
        };

        const clampText = (value, maxLength) => String(value || '').normalize('NFKC').trim().slice(0, maxLength);

        const normalizeUrlInput = (value) => {
            const raw = String(value || '').normalize('NFKC').trim();
            if (!raw) return "";
            const withProtocol = /^https?:\/\//i.test(raw) ? raw : `https://${raw}`;
            try {
                const url = new URL(withProtocol);
                if (!['http:', 'https:'].includes(url.protocol)) return "";
                return url.href;
            } catch (e) {
                return "";
            }
        };

        const sanitizeChatMessage = (doc) => {
            if (!isPlainObject(doc)) return null;
            const text = clampText(doc.text, 1000);
            const timestamp = Number(doc.timestamp);
            if (!text || !Number.isFinite(timestamp)) return null;
            return {
                text,
                timestamp,
                senderName: clampText(doc.senderName || "名無し", 24) || "名無し",
                userId: clampText(doc.userId || "anon", 80) || "anon",
                isPinned: !!doc.isPinned
            };
        };

        const sanitizeUtilityLink = (doc) => {
            if (!isPlainObject(doc)) return null;
            const name = clampText(doc.name, 80);
            const url = normalizeUrlInput(doc.url);
            if (!name || !url) return null;
            const order = Number(doc.order);
            return {
                name,
                url,
                order: Number.isFinite(order) ? order : 0
            };
        };

        const sanitizeBossOrder = (order, fallbackOrder = DEFAULT_BOSS_ORDER) => {
            const allowedNames = new Set(fallbackOrder);
            const seen = new Set();
            const clean = Array.isArray(order) ? order.filter(name => {
                if (!allowedNames.has(name) || seen.has(name)) return false;
                seen.add(name);
                return true;
            }) : [];
            fallbackOrder.forEach(name => {
                if (!seen.has(name)) clean.push(name);
            });
            return clean;
        };

        const sanitizeStoredBossOrder = (order) => {
            if (!Array.isArray(order)) return DEFAULT_BOSS_ORDER;
            const seen = new Set();
            const clean = [];
            order.forEach(name => {
                const cleanName = clampText(name, 40);
                if (!cleanName || seen.has(cleanName)) return;
                seen.add(cleanName);
                clean.push(cleanName);
            });
            return clean.length ? clean : DEFAULT_BOSS_ORDER;
        };

        const sanitizeCustomBosses = (bosses) => {
            if (!Array.isArray(bosses)) return [];
            const seen = new Set(DEFAULT_BOSS_ORDER);
            return bosses.map((boss, index) => {
                if (!isPlainObject(boss)) return null;
                const name = clampText(boss.name, 40);
                const lv = parseInt(boss.lv, 10);
                const type = boss.type === "weekly" ? "weekly" : (boss.type === "daily" ? "daily" : "interval");
                const value = parseFloat(boss.value);
                const dailyTimes = validateDailyTimes(boss.times);
                const weeklySchedule = validateWeeklySchedule(boss.schedule);
                if (!name || seen.has(name) || !Number.isFinite(lv) || lv <= 0) return null;
                if (type === "interval" && (!Number.isFinite(value) || value <= 0)) return null;
                if (type === "daily" && !dailyTimes.valid) return null;
                if (type === "weekly" && !weeklySchedule.valid) return null;
                seen.add(name);
                return {
                    id: clampText(boss.id, 80) || `custom_${index}`,
                    lv,
                    name,
                    type,
                    ...(type === "interval" ? { value } : (type === "weekly" ? { schedule: weeklySchedule.value } : { times: dailyTimes.value })),
                    bigArea: clampText(boss.bigArea, 80) || "カスタム",
                    area: clampText(boss.area, 80) || "未設定",
                    color: boss.color === "purple" ? "purple" : "red"
                };
            }).filter(Boolean);
        };

        const readNotifiedEvents = () => {
            try {
                const saved = JSON.parse(localStorage.getItem(NOTIFIED_EVENTS_KEY) || "[]");
                if (!Array.isArray(saved)) return new Set();
                return new Set(saved.filter(item => typeof item === 'string'));
            } catch (e) {
                localStorage.removeItem(NOTIFIED_EVENTS_KEY);
                return new Set();
            }
        };

        const readChatLastSeen = () => {
            const timestamp = Number(localStorage.getItem(CHAT_LAST_SEEN_KEY));
            return Number.isFinite(timestamp) && timestamp > 0 ? timestamp : 0;
        };

        const persistNotifiedEvents = (events) => {
            try {
                localStorage.setItem(NOTIFIED_EVENTS_KEY, JSON.stringify([...events].slice(-200)));
            } catch (e) {
                console.warn("Could not persist notification history.", e);
            }
        };

        const readNotificationEnabled = () => localStorage.getItem(NOTIFY_ENABLED_KEY) === "true";

        const normalizeNotifyLeadMinutes = (value) => {
            const minutes = parseInt(value, 10);
            if (!Number.isFinite(minutes)) return DEFAULT_NOTIFY_LEAD_MINUTES;
            return Math.min(120, Math.max(1, minutes));
        };

        const readNotifyLeadMinutes = () => normalizeNotifyLeadMinutes(localStorage.getItem(NOTIFY_LEAD_MINUTES_KEY));

        const isNotificationSupported = () => typeof window !== 'undefined' && "Notification" in window;

        const registerServiceWorker = async () => {
            if (!("serviceWorker" in navigator)) return null;
            try {
                const registration = await navigator.serviceWorker.register("./sw.js");
                return registration;
            } catch (e) {
                console.warn("Service worker registration failed.", e);
                return null;
            }
        };

        const showBossNotification = async (event) => {
            if (!isNotificationSupported() || Notification.permission !== "granted") return false;
            const title = `${event.name} まもなく出現`;
            const body = `Lv.${event.lv} / ${event.bigArea} / ${formatPredictedTime(event.eventTime)}`;
            const options = {
                body,
                tag: `l9-${event.name}-${event.eventTime}`,
                renotify: false,
                requireInteraction: false,
                icon: "./icon.svg",
                badge: "./icon.svg",
                data: { url: location.href }
            };

            try {
                if ("serviceWorker" in navigator) {
                    const registration = await navigator.serviceWorker.getRegistration("./") || await registerServiceWorker();
                    if (registration?.showNotification) {
                        await registration.showNotification(title, options);
                        return true;
                    }
                }
                new Notification(title, options);
                return true;
            } catch (e) {
                console.warn("Could not show notification.", e);
                return false;
            }
        };

        // Formatting utilities
        const formatToHHMM = (ts) => {
            if (!ts || ts === 0) return "";
            const d = new Date(ts);
            return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
        };

        const formatToMDHM = (ts) => {
            if (!ts || ts === 0) return "";
            const d = new Date(ts);
            return `${d.getMonth() + 1}/${d.getDate()} ${formatToHHMM(ts)}`;
        };

        const formatPredictedTime = (ts) => {
            if (!ts) return "---";
            const d = new Date(ts);
            const nowTime = new Date();
            const isDifferentDay = d.getDate() !== nowTime.getDate() || d.getMonth() !== nowTime.getMonth() || d.getFullYear() !== nowTime.getFullYear();
            const hh = String(d.getHours()).padStart(2, '0');
            const mm = String(d.getMinutes()).padStart(2, '0');
            const timeStr = `${hh}:${mm}`;
            return isDifferentDay ? `${DAYS[d.getDay()]} ${timeStr}` : timeStr;
        };

        const formatHeaderCountdown = (ms) => {
            if (ms <= 0) return "出現中";
            const totalSec = Math.floor(ms / 1000);
            const h = Math.floor(totalSec / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            return `${String(h).padStart(2, '0')}時${String(m).padStart(2, '0')}分${String(s).padStart(2, '0')}秒`;
        };

        const getNextWeeklyTime = (schedule) => {
            if (!schedule || schedule.length === 0) return 0;
            const nowTime = new Date();
            const options = schedule.map(s => {
                let next = new Date();
                const [h, m] = s.time.split(':').map(Number);
                next.setHours(h, m, 0, 0);
                let dayDiff = s.day - nowTime.getDay();
                if (dayDiff < 0 || (dayDiff === 0 && next < nowTime)) dayDiff += 7;
                next.setDate(nowTime.getDate() + dayDiff);
                return next.getTime();
            });
            return Math.min(...options);
        };

        const getNextDailyTime = (times) => {
            if (!times || times.length === 0) return 0;
            const nowTime = new Date();
            const options = times.map(t => {
                let next = new Date();
                const [h, m] = t.split(':').map(Number);
                next.setHours(h, m, 0, 0);
                if (next < nowTime) next.setDate(nowTime.getDate() + 1);
                return next.getTime();
            });
            return Math.min(...options);
        };

        const formatCountdown = (ms, large = false) => {
            if (ms <= 0) return <span className="pulse-red font-bold text-xs md:text-sm px-2 py-0.5 rounded bg-red-500/10 border border-red-500/20">出現中</span>;
            const totalSec = Math.floor(ms / 1000);
            const h = Math.floor(totalSec / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            const colorClass = totalSec < 600 ? "text-red-500" : (totalSec < 1800 ? "text-orange-500" : "text-slate-400");
            const sizeClass = large ? "text-lg md:text-xl" : "text-[10px] md:text-[11px]";
            return (
                <div className={`font-mono font-bold ${sizeClass} px-1.5 py-0.5 rounded bg-slate-900/80 border border-slate-800 ${colorClass}`}>
                    {h}h {m}m {s}s
                </div>
            );
        };

        const buildStrictTimestamp = (year, month, day, hour, minute) => {
            if (hour < 0 || hour > 23 || minute < 0 || minute > 59) return 0;
            const d = new Date(year, month - 1, day, hour, minute, 0, 0);
            const isSameDate = d.getFullYear() === year && d.getMonth() === month - 1 && d.getDate() === day;
            const isSameTime = d.getHours() === hour && d.getMinutes() === minute;
            return isSameDate && isSameTime ? d.getTime() : 0;
        };

        const parseTimeInputToTimestamp = (str, isStrictToday = false) => {
            if (!str) return 0;
            const normalized = str.normalize('NFKC');
            const fullDateMatch = normalized.match(/^(\d{4})[/-](\d{1,2})[/-](\d{1,2})\s+(\d{1,2})[:]?(\d{2})$/);
            if (fullDateMatch) {
                const [_, y, m, d, hh, mm] = fullDateMatch;
                return buildStrictTimestamp(parseInt(y), parseInt(m), parseInt(d), parseInt(hh), parseInt(mm));
            }
            const shortDateMatch = normalized.match(/^(\d{1,2})[/-](\d{1,2})\s+(\d{1,2})[:]?(\d{2})$/);
            if (shortDateMatch) {
                const [_, m, d, hh, mm] = shortDateMatch;
                const nowTime = new Date();
                return buildStrictTimestamp(nowTime.getFullYear(), parseInt(m), parseInt(d), parseInt(hh), parseInt(mm));
            }
            let clean = normalized.replace(/\D/g, '');
            if (clean.length === 3) clean = '0' + clean;
            if (clean.length === 4) {
                const h = parseInt(clean.substring(0, 2));
                const m = parseInt(clean.substring(2, 4));
                if (h < 24 && m < 60) {
                    const d = new Date();
                    d.setHours(h, m, 0, 0);
                    if (!isStrictToday) {
                        const nowTime = new Date();
                        if (d.getTime() > nowTime.getTime()) d.setDate(d.getDate() - 1);
                    }
                    return d.getTime();
                }
            }
            return 0;
        };

        const handleSafeTimeInput = (rawVal, setter) => {
            let val = rawVal.normalize('NFKC');
            if (/[/-]|\s/.test(val)) { setter(val); return; }
            let digits = val.replace(/\D/g, '').slice(0, 4);
            if (digits.length >= 3) setter(digits.slice(0, 2) + ':' + digits.slice(2));
            else setter(digits);
        };

        function App() {
            const [activeTab, setActiveTab] = useState('timer');
            const [history, setHistory] = useState(readSavedHistory);
            const [utilityLinks, setUtilityLinks] = useState([]);
            const [messages, setMessages] = useState([]);
            const [customBosses, setCustomBosses] = useState([]);
            const [bossOrder, setBossOrder] = useState(DEFAULT_BOSS_ORDER);
            const [isBossEditOpen, setIsBossEditOpen] = useState(false);
            const [selectedEditBossName, setSelectedEditBossName] = useState("");
            const [topLvFilter, setTopLvFilter] = useState('ALL');
            const [mainSortMode, setMainSortMode] = useState('DEFAULT'); 
            const [now, setNow] = useState(Date.now());
            const [isOnline, setIsOnline] = useState(false);
            const [hasNewChat, setHasNewChat] = useState(false);
            const [chatFavoriteChecked, setChatFavoriteChecked] = useState(true);
            const [editingBoss, setEditingBoss] = useState(null); 
            const [isMaintResetOpen, setIsMaintResetOpen] = useState(false);
            const [linkModal, setLinkModal] = useState(null);
            const [bossModal, setBossModal] = useState(null);
            const [maintInput, setMaintTime] = useState("");
            const [toast, setToast] = useState(null);
            const [notificationsEnabled, setNotificationsEnabled] = useState(readNotificationEnabled);
            const [notifyLeadMinutes, setNotifyLeadMinutes] = useState(readNotifyLeadMinutes);
            const [notificationPermission, setNotificationPermission] = useState(() => isNotificationSupported() ? Notification.permission : "unsupported");
            const [isAnonymous, setIsAnonymous] = useState(() => localStorage.getItem(ANON_STATE_KEY) === 'true');
            const toastTimerRef = useRef(null);
            const notifiedEventsRef = useRef(readNotifiedEvents());
            const lastSeenChatTimestampRef = useRef(readChatLastSeen());
            const isChatSnapshotInitializedRef = useRef(false);
            const senderNameRef = useRef(localStorage.getItem(SENDER_NAME_KEY) || "");
            const chatInputRef = useRef(null);
            const chatEndRef = useRef(null);

            const showToast = (message, type = 'info') => {
                if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
                setToast({ message, type });
                toastTimerRef.current = setTimeout(() => setToast(null), TOAST_DURATION);
            };

            const applyLocalHistory = (updater) => {
                setHistory(prev => {
                    const nextHistory = typeof updater === 'function' ? updater(prev) : updater;
                    if (!persistHistory(nextHistory)) {
                        setTimeout(() => showToast("ブラウザへのローカル保存に失敗しました。", "warning"), 0);
                    }
                    return nextHistory;
                });
            };

            const handleNotifyLeadChange = (rawValue) => {
                const minutes = normalizeNotifyLeadMinutes(rawValue);
                localStorage.setItem(NOTIFY_LEAD_MINUTES_KEY, String(minutes));
                setNotifyLeadMinutes(minutes);
            };

            const buildTopEventCopyLine = (event) => {
                const areaText = event.bigArea || event.area || "";
                const timeText = formatPredictedTime(event.eventTime);
                return areaText ? `${event.name} (${areaText} )${timeText}` : `${event.name} ${timeText}`;
            };

            const copyTextToClipboard = async (text) => {
                if (navigator.clipboard?.writeText) {
                    try {
                        await navigator.clipboard.writeText(text);
                        return true;
                    } catch (e) {
                        console.warn("Clipboard API copy failed.", e);
                    }
                }

                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.setAttribute('readonly', '');
                textarea.style.position = 'fixed';
                textarea.style.top = '0';
                textarea.style.left = '-9999px';
                document.body.appendChild(textarea);
                textarea.focus({ preventScroll: true });
                textarea.select();
                textarea.setSelectionRange(0, text.length);
                try {
                    return document.execCommand('copy');
                } catch (e) {
                    console.warn("Fallback copy failed.", e);
                    return false;
                } finally {
                    document.body.removeChild(textarea);
                }
            };

            const handleCopyTopEvent = async (event, e) => {
                e.stopPropagation();
                const copied = await copyTextToClipboard(buildTopEventCopyLine(event));
                showToast(copied ? "1行コピーしました。" : "コピーに失敗しました。", copied ? "success" : "warning");
            };

            const handleToggleNotifications = async () => {
                if (notificationsEnabled) {
                    localStorage.setItem(NOTIFY_ENABLED_KEY, "false");
                    setNotificationsEnabled(false);
                    showToast(`${notifyLeadMinutes}分前通知をオフにしました。`, "info");
                    return;
                }

                if (!isNotificationSupported()) {
                    showToast("このブラウザは通知に対応していません。iPhoneではホーム画面に追加して開いてください。", "warning");
                    return;
                }

                await registerServiceWorker();
                let permission = Notification.permission;
                if (permission !== "granted") {
                    permission = await Notification.requestPermission();
                }
                setNotificationPermission(permission);

                if (permission === "granted") {
                    localStorage.setItem(NOTIFY_ENABLED_KEY, "true");
                    setNotificationsEnabled(true);
                    showToast(`直近10体の${notifyLeadMinutes}分前通知をオンにしました。`, "success");
                } else {
                    localStorage.setItem(NOTIFY_ENABLED_KEY, "false");
                    setNotificationsEnabled(false);
                    showToast("通知が許可されていません。iPhoneの通知設定を確認してください。", "warning");
                }
            };

            useEffect(() => {
                return () => {
                    if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
                };
            }, []);

            useEffect(() => {
                const unsubscribes = [];
                let isMounted = true;
                const initFirebase = async () => {
                    try {
                        await auth.signInAnonymously();
                        if (!isMounted) return;
                        setIsOnline(true);
                        unsubscribes.push(db.collection(FIRESTORE_COLLECTION_PATH).onSnapshot(snapshot => {
                            const data = {};
                            snapshot.forEach(doc => {
                                data[doc.id] = sanitizeBossStatus(doc.data());
                            });
                            if (!isMounted) return;
                            setIsOnline(true);
                            applyLocalHistory(prev => ({ ...prev, ...data }));
                        }, (e) => {
                            console.warn("Firestore sync failed.", e);
                            if (!isMounted) return;
                            setIsOnline(false);
                            showToast("同期に失敗しました。ローカル保存で続行します。", "error");
                        }));
                        unsubscribes.push(db.collection(UTILITY_LINKS_COLLECTION_PATH).onSnapshot(snapshot => {
                            const data = [];
                            snapshot.forEach(doc => {
                                const clean = sanitizeUtilityLink(doc.data());
                                if (clean) data.push({ id: doc.id, ...clean });
                            });
                            if (!isMounted) return;
                            setUtilityLinks(data.sort((a, b) => a.order - b.order || a.name.localeCompare(b.name, 'ja')));
                        }, (e) => {
                            console.warn("Utility links sync failed.", e);
                            if (!isMounted) return;
                            showToast("サイト一覧の同期に失敗しました。", "warning");
                        }));
                        unsubscribes.push(db.collection(CHAT_MESSAGES_COLLECTION_PATH).onSnapshot(snapshot => {
                            const data = [];
                            snapshot.forEach(doc => {
                                const clean = sanitizeChatMessage(doc.data());
                                if (clean) data.push({ id: doc.id, ...clean });
                            });
                            if (!isMounted) return;
                            setMessages(data.sort((a, b) => a.timestamp - b.timestamp).slice(-200));
                        }, (e) => {
                            console.warn("Chat messages sync failed.", e);
                            if (!isMounted) return;
                            showToast("掲示板の同期に失敗しました。", "warning");
                        }));
                        unsubscribes.push(db.collection(APP_SETTINGS_COLLECTION_PATH).doc('boss_order').onSnapshot(doc => {
                            if (!isMounted) return;
                            setBossOrder(sanitizeStoredBossOrder(doc.exists ? doc.data()?.order : null));
                        }, (e) => {
                            console.warn("Boss order sync failed.", e);
                            if (!isMounted) return;
                            showToast("初期順の同期に失敗しました。", "warning");
                        }));
                        unsubscribes.push(db.collection(APP_SETTINGS_COLLECTION_PATH).doc('custom_bosses').onSnapshot(doc => {
                            if (!isMounted) return;
                            setCustomBosses(sanitizeCustomBosses(doc.exists ? doc.data()?.bosses : []));
                        }, (e) => {
                            console.warn("Custom bosses sync failed.", e);
                            if (!isMounted) return;
                            showToast("追加ボスの同期に失敗しました。", "warning");
                        }));
                    } catch (e) {
                        console.warn("Firebase initialization failed.", e);
                        if (!isMounted) return;
                        setIsOnline(false);
                        showToast("Firebaseに接続できません。ローカル保存で続行します。", "error");
                    }
                };
                initFirebase();
                const interval = setInterval(() => setNow(Date.now()), 1000);
                return () => {
                    isMounted = false;
                    unsubscribes.forEach(unsubscribe => unsubscribe());
                    clearInterval(interval);
                };
            }, []);

            useEffect(() => {
                localStorage.setItem(ANON_STATE_KEY, isAnonymous ? 'true' : 'false');
            }, [isAnonymous]);

            useEffect(() => {
                if (activeTab === 'chat') {
                    chatEndRef.current?.scrollIntoView({ behavior: 'smooth', block: 'end' });
                }
            }, [messages, activeTab]);

            const allBossData = useMemo(() => {
                return [
                    ...BOSS_DATA_RAW,
                    ...customBosses.map((boss, index) => ({
                        ...boss,
                        originalIndex: BOSS_DATA_RAW.length + index,
                        isCustom: true
                    }))
                ];
            }, [customBosses]);

            const allBossNames = useMemo(() => allBossData.map(boss => boss.name), [allBossData]);
            const effectiveBossOrder = useMemo(() => sanitizeBossOrder(bossOrder, allBossNames), [bossOrder, allBossNames]);

            const processedBosses = useMemo(() => {
                return allBossData.map(boss => {
                    let nextSpawn = 0;
                    let docData = history[boss.name] || {};
                    let displayLastKill = docData.lastKill || 0;
                    let isAutoUpdated = false;
                    let cycleValue = docData.customInterval || boss.value;
                    let weeklySchedule = docData.customWeeklySchedule || boss.schedule;
                    let dailyTimes = docData.customDailyTimes || boss.times;
                    if (boss.type === 'interval') {
                        const intervalMs = cycleValue * 3600 * 1000;
                        if (displayLastKill !== 0) {
                            let currentPredicted = displayLastKill + intervalMs;
                            while (now > currentPredicted + GRACE_PERIOD) {
                                displayLastKill += intervalMs;
                                currentPredicted = displayLastKill + intervalMs;
                                isAutoUpdated = true;
                            }
                            nextSpawn = currentPredicted;
                        }
                    } else if (boss.type === 'weekly') {
                        nextSpawn = getNextWeeklyTime(weeklySchedule);
                    } else if (boss.type === 'daily') {
                        nextSpawn = getNextDailyTime(dailyTimes);
                    }
                    return { ...boss, nextSpawn, displayLastKill, isAutoUpdated, currentCycle: cycleValue, currentWeeklySchedule: weeklySchedule, currentDailyTimes: dailyTimes, historyLog: docData.historyLog || [] };
                });
            }, [history, now, allBossData]);

            const selectedEditBoss = useMemo(() => {
                return processedBosses.find(boss => boss.name === selectedEditBossName)
                    || processedBosses.find(boss => boss.name === effectiveBossOrder[0])
                    || null;
            }, [processedBosses, selectedEditBossName, effectiveBossOrder]);
            const selectedEditIndex = effectiveBossOrder.indexOf(selectedEditBoss?.name);

            useEffect(() => {
                if (!isBossEditOpen) return;
                if (!effectiveBossOrder.includes(selectedEditBossName)) {
                    setSelectedEditBossName(effectiveBossOrder[0] || "");
                }
            }, [isBossEditOpen, effectiveBossOrder, selectedEditBossName]);

            const top10SoonEvents = useMemo(() => {
                const events = [];
                processedBosses.forEach(boss => {
                    if (boss.nextSpawn === 0) return;
                    if (boss.name !== 'ネドラ' && topLvFilter !== 'ALL' && !(boss.lv >= 60 && boss.lv <= 100)) return;

                    if (boss.nextSpawn > now - GRACE_PERIOD) {
                        events.push({ ...boss, eventTime: boss.nextSpawn });
                    }
                    if (boss.type === 'interval') {
                        const intervalMs = boss.currentCycle * 3600 * 1000;
                        const secondSpawn = boss.nextSpawn + intervalMs;
                        if (secondSpawn > now - GRACE_PERIOD) {
                            events.push({ ...boss, eventTime: secondSpawn });
                        }
                    }
                });
                return events.sort((a, b) => a.eventTime - b.eventTime).slice(0, 10);
            }, [processedBosses, topLvFilter, now]);

            const sortedMainList = useMemo(() => {
                const list = [...processedBosses];
                const orderMap = new Map(effectiveBossOrder.map((name, index) => [name, index]));
                switch (mainSortMode) {
                    case 'LEVEL': return list.sort((a, b) => a.lv - b.lv || a.originalIndex - b.originalIndex);
                    case 'NAME': return list.sort((a, b) => a.name.localeCompare(b.name, 'ja') || a.originalIndex - b.originalIndex);
                    case 'TIME': return list.sort((a, b) => {
                        if (a.nextSpawn === 0 && b.nextSpawn === 0) return a.originalIndex - b.originalIndex;
                        if (a.nextSpawn === 0) return 1;
                        if (b.nextSpawn === 0) return -1;
                        return a.nextSpawn - b.nextSpawn;
                    });
                    default: return list.sort((a, b) => (orderMap.get(a.name) ?? a.originalIndex) - (orderMap.get(b.name) ?? b.originalIndex));
                }
            }, [processedBosses, mainSortMode, effectiveBossOrder]);

            const globalMostRecent = useMemo(() => {
                const soonest = [...top10SoonEvents].filter(e => e.eventTime > now);
                return soonest.length > 0 ? soonest[0] : null;
            }, [top10SoonEvents, now]);

            const pinnedMessages = useMemo(() => {
                return messages.filter(message => message.isPinned).sort((a, b) => b.timestamp - a.timestamp).slice(0, 10);
            }, [messages]);

            const latestChatTimestamp = useMemo(() => {
                return messages.reduce((latest, message) => Math.max(latest, Number(message.timestamp) || 0), 0);
            }, [messages]);

            useEffect(() => {
                if (!latestChatTimestamp) return;
                if (!isChatSnapshotInitializedRef.current) {
                    isChatSnapshotInitializedRef.current = true;
                    if (!lastSeenChatTimestampRef.current) {
                        lastSeenChatTimestampRef.current = latestChatTimestamp;
                        localStorage.setItem(CHAT_LAST_SEEN_KEY, String(latestChatTimestamp));
                        return;
                    }
                }

                if (activeTab === 'chat') {
                    lastSeenChatTimestampRef.current = latestChatTimestamp;
                    localStorage.setItem(CHAT_LAST_SEEN_KEY, String(latestChatTimestamp));
                    setHasNewChat(false);
                    return;
                }

                if (latestChatTimestamp > lastSeenChatTimestampRef.current) {
                    setHasNewChat(true);
                }
            }, [latestChatTimestamp, activeTab]);

            useEffect(() => {
                if (!notificationsEnabled || notificationPermission !== "granted") return;
                const notifyLeadMs = notifyLeadMinutes * 60 * 1000;
                const staleCutoff = now - (24 * 60 * 60 * 1000);
                const currentEvents = new Set(top10SoonEvents.map(event => `${event.name}:${event.eventTime}`));
                notifiedEventsRef.current.forEach(id => {
                    const eventTime = Number(id.split(':').pop());
                    if (!Number.isFinite(eventTime) || eventTime < staleCutoff) {
                        notifiedEventsRef.current.delete(id);
                    }
                });

                top10SoonEvents.forEach(event => {
                    const diff = event.eventTime - now;
                    const eventId = `${event.name}:${event.eventTime}`;
                    if (diff > 0 && diff <= notifyLeadMs && !notifiedEventsRef.current.has(eventId)) {
                        notifiedEventsRef.current.add(eventId);
                        persistNotifiedEvents(notifiedEventsRef.current);
                        showBossNotification(event).then(sent => {
                            if (!sent) {
                                notifiedEventsRef.current.delete(eventId);
                                persistNotifiedEvents(notifiedEventsRef.current);
                                showToast("通知を表示できませんでした。通知設定を確認してください。", "warning");
                            }
                        });
                    }
                });

                persistNotifiedEvents(new Set([...notifiedEventsRef.current].filter(id => {
                    const eventTime = Number(id.split(':').pop());
                    return currentEvents.has(id) || (Number.isFinite(eventTime) && eventTime >= staleCutoff);
                })));
            }, [top10SoonEvents, now, notificationsEnabled, notificationPermission, notifyLeadMinutes]);

            const handleSaveRecord = async () => {
                if (!editingBoss) return;
                const bossName = editingBoss.name;
                const ts = parseTimeInputToTimestamp(editingBoss.tempTime);
                if (!ts) {
                    showToast("討伐時間を正しく入力してください。", "error");
                    return;
                }
                const currentLog = sanitizeHistoryLog(history[bossName]?.historyLog || []);
                const newLog = [{ timestamp: ts, recordedAt: Date.now() }, ...currentLog].slice(0, 10);
                const updateObj = { lastKill: ts, historyLog: newLog };
                applyLocalHistory(prev => ({ ...prev, [bossName]: { ...prev[bossName], ...updateObj } }));
                try {
                    await db.collection(FIRESTORE_COLLECTION_PATH).doc(bossName).set(updateObj, { merge: true });
                    showToast("討伐時間を保存しました。", "success");
                } catch (e) {
                    console.warn("Could not sync boss record.", e);
                    setIsOnline(false);
                    showToast("ローカルには保存しましたが、同期に失敗しました。", "warning");
                }
                setEditingBoss(null);
            };

            const handleSaveSettings = async () => {
                if (!editingBoss) return;
                const bossName = editingBoss.name;
                const shouldReturnToBossEdit = Boolean(editingBoss.returnToBossEdit);
                const updateObj = {};
                if (editingBoss.type === 'interval') {
                    const interval = parseFloat(editingBoss.tempInterval);
                    if (!Number.isFinite(interval) || interval <= 0) {
                        showToast("出現周期は0より大きい数字で入力してください。", "error");
                        return;
                    }
                    updateObj.customInterval = interval;
                } else if (editingBoss.type === 'weekly') {
                    const schedule = validateWeeklySchedule(editingBoss.tempWeeklySchedule);
                    if (!schedule.valid) {
                        showToast(schedule.message, "error");
                        return;
                    }
                    updateObj.customWeeklySchedule = schedule.value;
                } else if (editingBoss.type === 'daily') {
                    const times = validateDailyTimes(editingBoss.tempDailyTimes);
                    if (!times.valid) {
                        showToast(times.message, "error");
                        return;
                    }
                    updateObj.customDailyTimes = times.value;
                }
                if (Object.keys(updateObj).length > 0) {
                    applyLocalHistory(prev => ({ ...prev, [bossName]: { ...prev[bossName], ...updateObj } }));
                    try {
                        await db.collection(FIRESTORE_COLLECTION_PATH).doc(bossName).set(updateObj, { merge: true });
                        showToast("出現設定を保存しました。", "success");
                    } catch (e) {
                        console.warn("Could not sync boss settings.", e);
                        setIsOnline(false);
                        showToast("設定はローカルに保存しましたが、同期に失敗しました。", "warning");
                    }
                }
                if (shouldReturnToBossEdit) {
                    setEditingBoss(null);
                    setIsBossEditOpen(true);
                    return;
                }
                setEditingBoss(p => ({
                    ...p,
                    view: 'record',
                    currentCycle: updateObj.customInterval ?? p.currentCycle,
                    currentWeeklySchedule: updateObj.customWeeklySchedule ?? p.currentWeeklySchedule,
                    currentDailyTimes: updateObj.customDailyTimes ?? p.currentDailyTimes,
                    tempInterval: updateObj.customInterval ?? p.tempInterval,
                    tempWeeklySchedule: updateObj.customWeeklySchedule ?? p.tempWeeklySchedule,
                    tempDailyTimes: updateObj.customDailyTimes ?? p.tempDailyTimes
                }));
            };

            const handleMaintReset = async () => {
                const targetTs = parseTimeInputToTimestamp(maintInput, true);
                if (!targetTs) {
                    showToast("メンテ終了時刻を正しく入力してください。", "error");
                    return;
                }

                const batch = db.batch();
                const updates = {};
                const recordedAt = Date.now();
                allBossData.forEach(boss => {
                    if (boss.type === 'interval') {
                        const cycle = history[boss.name]?.customInterval || boss.value;
                        const intervalMs = cycle * 3600 * 1000;
                        const newLastKill = targetTs - intervalMs;
                        
                        const ref = db.collection(FIRESTORE_COLLECTION_PATH).doc(boss.name);
                        const currentLog = sanitizeHistoryLog(history[boss.name]?.historyLog || []);
                        const newLog = [{ timestamp: newLastKill, recordedAt, isMaint: true }, ...currentLog].slice(0, 10);
                        updates[boss.name] = { lastKill: newLastKill, historyLog: newLog };
                        batch.set(ref, updates[boss.name], { merge: true });
                    }
                });
                applyLocalHistory(prev => {
                    const nextHistory = { ...prev };
                    Object.entries(updates).forEach(([bossName, updateObj]) => {
                        nextHistory[bossName] = { ...nextHistory[bossName], ...updateObj };
                    });
                    return nextHistory;
                });

                try {
                    await batch.commit();
                    showToast("メンテナンス・リセットを反映しました。", "success");
                } catch (e) {
                    console.warn("Could not sync maintenance reset.", e);
                    setIsOnline(false);
                    showToast("ローカルには反映しましたが、同期に失敗しました。", "warning");
                }
                setIsMaintResetOpen(false);
                setMaintTime("");
            };

            const handleDeleteHistory = async (idx) => {
                if (!editingBoss) return;
                const bossName = editingBoss.name;
                const newLog = [...editingBoss.historyLog];
                if (idx < 0 || idx >= newLog.length) return;
                newLog.splice(idx, 1);
                const updateObj = { historyLog: newLog };
                if (editingBoss.type === 'interval' && idx === 0) {
                    updateObj.lastKill = newLog[0]?.timestamp || 0;
                }
                setEditingBoss(p => ({
                    ...p,
                    historyLog: newLog,
                    ...(updateObj.lastKill !== undefined ? { displayLastKill: updateObj.lastKill, tempTime: formatToHHMM(updateObj.lastKill) } : {})
                }));
                applyLocalHistory(prev => ({ ...prev, [bossName]: { ...prev[bossName], ...updateObj } }));
                try {
                    await db.collection(FIRESTORE_COLLECTION_PATH).doc(bossName).set(updateObj, { merge: true });
                    showToast("履歴を削除しました。", "success");
                } catch (e) {
                    console.warn("Could not sync history delete.", e);
                    setIsOnline(false);
                    showToast("履歴はローカルで削除しましたが、同期に失敗しました。", "warning");
                }
            };

            const handleSendChat = async () => {
                const text = clampText(chatInputRef.current?.value || "", 1000);
                if (!text) {
                    showToast("メッセージを入力してください。", "warning");
                    return;
                }
                const senderName = isAnonymous ? "匿名" : (clampText(senderNameRef.current, 24) || "名無し");
                localStorage.setItem(SENDER_NAME_KEY, senderNameRef.current);
                try {
                    await db.collection(CHAT_MESSAGES_COLLECTION_PATH).add({
                        text,
                        senderName,
                        timestamp: Date.now(),
                        userId: auth.currentUser?.uid || "anon",
                        isPinned: chatFavoriteChecked
                    });
                    if (chatInputRef.current) chatInputRef.current.value = "";
                    setChatFavoriteChecked(true);
                } catch (e) {
                    console.warn("Could not send chat message.", e);
                    setIsOnline(false);
                    showToast("メッセージの送信に失敗しました。", "error");
                }
            };

            const togglePinChat = async (id, current) => {
                try {
                    await db.collection(CHAT_MESSAGES_COLLECTION_PATH).doc(id).update({ isPinned: !current });
                } catch (e) {
                    console.warn("Could not toggle chat pin.", e);
                    showToast("ピン留めの更新に失敗しました。", "warning");
                }
            };

            const deleteChat = async (id) => {
                try {
                    await db.collection(CHAT_MESSAGES_COLLECTION_PATH).doc(id).delete();
                    showToast("メッセージを削除しました。", "success");
                } catch (e) {
                    console.warn("Could not delete chat message.", e);
                    showToast("メッセージの削除に失敗しました。", "warning");
                }
            };

            const handleSaveLink = async () => {
                if (!linkModal) return;
                const name = clampText(linkModal.name, 80);
                const url = normalizeUrlInput(linkModal.url);
                if (!name || !url) {
                    showToast("サイト名とURLを正しく入力してください。", "error");
                    return;
                }
                const updateObj = { name, url };
                try {
                    if (linkModal.mode === 'add') {
                        await db.collection(UTILITY_LINKS_COLLECTION_PATH).add({ ...updateObj, order: utilityLinks.length });
                        showToast("サイトを追加しました。", "success");
                    } else {
                        await db.collection(UTILITY_LINKS_COLLECTION_PATH).doc(linkModal.id).set(updateObj, { merge: true });
                        showToast("サイトを更新しました。", "success");
                    }
                    setLinkModal(null);
                } catch (e) {
                    console.warn("Could not save utility link.", e);
                    showToast("サイトの保存に失敗しました。", "error");
                }
            };

            const handleDeleteLink = async (id) => {
                try {
                    await db.collection(UTILITY_LINKS_COLLECTION_PATH).doc(id).delete();
                    showToast("サイトを削除しました。", "success");
                } catch (e) {
                    console.warn("Could not delete utility link.", e);
                    showToast("サイトの削除に失敗しました。", "warning");
                }
            };

            const getBossModalWeeklySchedule = (modal) => {
                if (Array.isArray(modal?.weeklySchedule) && modal.weeklySchedule.length) {
                    return modal.weeklySchedule;
                }
                const parsed = parseDailyTimesInput(modal?.times || "");
                const selectedDay = parseInt(modal?.weeklyDay, 10);
                const day = Number.isInteger(selectedDay) && selectedDay >= 0 && selectedDay <= 6 ? selectedDay : 0;
                const times = parsed.length ? parsed : ["12:00"];
                return times.map(time => ({ day, time }));
            };

            const handleSaveCustomBoss = async () => {
                if (!bossModal) return;
                const name = clampText(bossModal.name, 40);
                const bigArea = clampText(bossModal.bigArea, 80) || "カスタム";
                const area = clampText(bossModal.area, 80) || "未設定";
                const lv = parseInt(bossModal.lv, 10);
                const spawnType = bossModal.spawnType === "daily" ? "daily" : "interval";
                const scheduleMode = bossModal.scheduleMode === "weekly" ? "weekly" : "daily";
                const value = parseFloat(bossModal.value);
                const parsedTimes = parseDailyTimesInput(bossModal.times);
                const dailyTimes = validateDailyTimes(parsedTimes);
                const weeklySchedule = validateWeeklySchedule(getBossModalWeeklySchedule(bossModal));

                if (!name) {
                    showToast("ボス名を入力してください。", "error");
                    return;
                }
                if (allBossNames.includes(name)) {
                    showToast("同じ名前のボスが既にあります。", "error");
                    return;
                }
                if (!Number.isFinite(lv) || lv <= 0) {
                    showToast("Lvは1以上の数字で入力してください。", "error");
                    return;
                }
                if (spawnType === "interval" && (!Number.isFinite(value) || value <= 0)) {
                    showToast("出現周期は0より大きい数字で入力してください。", "error");
                    return;
                }
                if (spawnType === "daily" && scheduleMode !== "weekly" && !dailyTimes.valid) {
                    showToast(dailyTimes.message, "error");
                    return;
                }
                if (spawnType === "daily" && scheduleMode === "weekly" && !weeklySchedule.valid) {
                    showToast(weeklySchedule.message, "error");
                    return;
                }

                const nextBoss = {
                    id: `custom_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
                    lv,
                    name,
                    type: spawnType === "daily" && scheduleMode === "weekly" ? "weekly" : spawnType,
                    ...(spawnType === "interval" ? { value } : (scheduleMode === "weekly" ? { schedule: weeklySchedule.value } : { times: dailyTimes.value })),
                    bigArea,
                    area,
                    color: "red"
                };
                const nextCustomBosses = sanitizeCustomBosses([...customBosses, nextBoss]);
                const nextNames = [...allBossNames, name];
                const nextOrder = sanitizeBossOrder([...effectiveBossOrder, name], nextNames);
                const batch = db.batch();
                batch.set(db.collection(APP_SETTINGS_COLLECTION_PATH).doc('custom_bosses'), {
                    bosses: nextCustomBosses,
                    updatedAt: Date.now()
                }, { merge: true });
                batch.set(db.collection(APP_SETTINGS_COLLECTION_PATH).doc('boss_order'), {
                    order: nextOrder,
                    updatedAt: Date.now()
                }, { merge: true });

                try {
                    await batch.commit();
                    setCustomBosses(nextCustomBosses);
                    setBossOrder(nextOrder);
                    setSelectedEditBossName(name);
                    setBossModal(null);
                    showToast("ボスを追加しました。", "success");
                } catch (e) {
                    console.warn("Could not save custom boss.", e);
                    showToast("ボスの追加に失敗しました。", "error");
                }
            };

            const handleDeleteCustomBoss = async (targetBoss = editingBoss) => {
                if (!targetBoss?.isCustom) return;
                const bossName = targetBoss.name;
                if (!window.confirm(`「${bossName}」を削除しますか？`)) return;

                const nextCustomBosses = sanitizeCustomBosses(customBosses.filter(boss => boss.name !== bossName));
                const nextOrder = effectiveBossOrder.filter(name => name !== bossName);
                const batch = db.batch();
                batch.set(db.collection(APP_SETTINGS_COLLECTION_PATH).doc('custom_bosses'), {
                    bosses: nextCustomBosses,
                    updatedAt: Date.now()
                }, { merge: true });
                batch.set(db.collection(APP_SETTINGS_COLLECTION_PATH).doc('boss_order'), {
                    order: nextOrder,
                    updatedAt: Date.now()
                }, { merge: true });
                batch.delete(db.collection(FIRESTORE_COLLECTION_PATH).doc(bossName));

                try {
                    await batch.commit();
                    setCustomBosses(nextCustomBosses);
                    setBossOrder(nextOrder);
                    setSelectedEditBossName(prev => prev === bossName ? (nextOrder[0] || "") : prev);
                    applyLocalHistory(prev => {
                        const nextHistory = { ...prev };
                        delete nextHistory[bossName];
                        return nextHistory;
                    });
                    if (editingBoss?.name === bossName) setEditingBoss(null);
                    showToast("追加ボスを削除しました。", "success");
                } catch (e) {
                    console.warn("Could not delete custom boss.", e);
                    showToast("追加ボスの削除に失敗しました。", "error");
                }
            };

            const saveBossOrder = async (nextOrder) => {
                const cleanOrder = sanitizeBossOrder(nextOrder, allBossNames);
                setBossOrder(cleanOrder);
                try {
                    await db.collection(APP_SETTINGS_COLLECTION_PATH).doc('boss_order').set({
                        order: cleanOrder,
                        updatedAt: Date.now()
                    }, { merge: true });
                } catch (e) {
                    console.warn("Could not save boss order.", e);
                    showToast("初期順の保存に失敗しました。", "warning");
                }
            };

            const moveBossOrder = (bossName, direction) => {
                const currentOrder = [...effectiveBossOrder];
                const index = currentOrder.indexOf(bossName);
                const nextIndex = index + direction;
                if (index < 0 || nextIndex < 0 || nextIndex >= currentOrder.length) return;
                const nextOrder = [...currentOrder];
                [nextOrder[index], nextOrder[nextIndex]] = [nextOrder[nextIndex], nextOrder[index]];
                saveBossOrder(nextOrder);
            };

            const openBossEditPanel = () => {
                setSelectedEditBossName(prev => effectiveBossOrder.includes(prev) ? prev : (effectiveBossOrder[0] || ""));
                setIsBossEditOpen(true);
            };

            const moveSelectedBossOrder = (direction) => {
                if (!selectedEditBossName) {
                    showToast("移動するボスを選択してください。", "warning");
                    return;
                }
                moveBossOrder(selectedEditBossName, direction);
            };

            const openSelectedBossSettings = () => {
                if (!selectedEditBoss) {
                    showToast("設定するボスを選択してください。", "warning");
                    return;
                }
                setIsBossEditOpen(false);
                openEdit(selectedEditBoss, 'settings', { returnToBossEdit: true });
            };

            const openEdit = (boss, view = 'record', options = {}) => {
                setEditingBoss({
                    ...boss, 
                    view, 
                    returnToBossEdit: Boolean(options.returnToBossEdit),
                    tempTime: formatToHHMM(boss.displayLastKill),
                    tempInterval: boss.currentCycle,
                    tempWeeklySchedule: [...(boss.currentWeeklySchedule || [])],
                    tempDailyTimes: [...(boss.currentDailyTimes || [])],
                    historyLog: boss.historyLog || []
                });
            };

            const closeBossSettings = () => {
                if (editingBoss?.returnToBossEdit) {
                    setEditingBoss(null);
                    setIsBossEditOpen(true);
                    return;
                }
                setEditingBoss(p => ({ ...p, view: 'record' }));
            };

            return (
                <div className="min-h-screen p-2 md:p-6 pb-20 relative text-slate-200">
                    {toast && (
                        <div className={`fixed top-3 left-1/2 -translate-x-1/2 z-[300] max-w-[92vw] rounded-lg border px-4 py-2 text-xs font-bold shadow-2xl ${TOAST_STYLES[toast.type] || TOAST_STYLES.info}`}>
                            {toast.message}
                        </div>
                    )}
                    <div className="max-w-6xl mx-auto">
                        
                        {/* Header */}
                        <div className="mb-6 sticky top-0 bg-slate-950/95 py-2 z-30 shadow-md">
                            <div className="flex items-start justify-between gap-3">
                                <div className="min-w-0">
                                    <div className="flex items-center gap-2">
                                        <h1 className="text-lg md:text-xl font-bold text-red-500 flex items-center gap-2 whitespace-nowrap">
                                            <IconClock size={22} /> LORD NINE
                                        </h1>
                                        <div className={`w-2 h-2 rounded-full shrink-0 ${isOnline ? 'bg-green-500 shadow-[0_0_8px_#22c55e]' : 'bg-red-500 animate-pulse'}`} title={isOnline ? 'オンライン同期中' : 'オフライン / 同期待機'} aria-label={isOnline ? 'オンライン同期中' : 'オフライン / 同期待機'}></div>
                                    </div>
                                    <div className="mt-2 flex items-center gap-2">
                                        <button onClick={handleToggleNotifications} className={`h-9 w-9 rounded-lg transition-colors border flex items-center justify-center ${notificationsEnabled && notificationPermission === 'granted' ? 'bg-emerald-600/20 text-emerald-300 border-emerald-500/40 hover:bg-emerald-600/30' : 'bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white border-slate-700/50'}`} title={notificationsEnabled ? `${notifyLeadMinutes}分前通知をオフ` : `${notifyLeadMinutes}分前通知をオン`} aria-label={notificationsEnabled ? `${notifyLeadMinutes}分前通知をオフ` : `${notifyLeadMinutes}分前通知をオン`}>
                                            {notificationsEnabled && notificationPermission === 'granted' ? <IconBell size={18} /> : <IconBellOff size={18} />}
                                        </button>
                                        <button onClick={() => setIsMaintResetOpen(true)} className="h-9 w-9 flex items-center justify-center bg-slate-800 hover:bg-slate-700 rounded-lg text-slate-400 hover:text-white transition-colors border border-slate-700/50" title="メンテリセット" aria-label="メンテリセット"><IconTool size={18} /></button>
                                        <label className="h-9 flex items-center gap-1 rounded-lg bg-slate-900/80 border border-slate-800 px-2 text-[10px] font-bold text-slate-400">
                                            <input
                                                type="number"
                                                min="1"
                                                max="120"
                                                inputMode="numeric"
