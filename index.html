<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LORD NINE ボス出現時間</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- React & Build Tools -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #020617; color: #e2e8f0; font-family: sans-serif; overflow-x: hidden; touch-action: manipulation; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
        input:focus { border-color: #ef4444; outline: none; box-shadow: 0 0 0 1px #ef4444; }
        .btn-active:active { transform: scale(0.95); }
        /* 適度なタップ範囲を確保 */
        button, input { min-height: 40px; }
        /* テーブルのスクロールバーを細く */
        .overflow-x-auto::-webkit-scrollbar { height: 4px; }
        .overflow-x-auto::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 2px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- 設定済みの Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyD8mUBp3fEmOCk0JdmpQaQjEBpor3UFnEk",
            authDomain: "lord-nine-timer.firebaseapp.com",
            projectId: "lord-nine-timer",
            storageBucket: "lord-nine-timer.firebasestorage.app",
            messagingSenderId: "219594241322",
            appId: "1:219594241322:web:208697256124c79e815a53"
        };
        const STORAGE_KEY = "L9_BOSS_TIMER_DATA";
        const appId = "lord-nine-boss-timer";

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const { useState, useEffect, useMemo, useRef } = React;
        const DAYS = ["日", "月", "火", "水", "木", "金", "土"];

        const IconClock = ({color="currentColor", size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{display:'inline'}}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconSword = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{display:'inline'}}><path d="M14.5 17.5 3 6V3h3l11.5 11.5"/><path d="M13 19l6-6"/><path d="M16 16l4 4"/><path d="M19 21l1-1"/></svg>;
        const IconFlame = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f97316" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{display:'inline'}}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>;
        const IconMap = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#475569" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{display:'inline'}}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;

        const BOSS_DATA_RAW = [
            { lv: 60, name: "ベナトゥス", type: "interval", value: 10, area: "汚染された川筋", color: "red" },
            { lv: 65, name: "ビオレント", type: "interval", value: 10, area: "エラ小川", color: "red" },
            { lv: 70, name: "エゴ", type: "interval", value: 21, area: "奪還集結地", color: "red" },
            { lv: 70, name: "クレメンティス", type: "weekly", schedule: [{ day: 1, time: "12:30" }, { day: 4, time: "20:00" }], area: "白の魔女のゆりかご", color: "red" },
            { lv: 75, name: "リベラ", type: "interval", value: 24, area: "高い風の半島", color: "red" },
            { lv: 75, name: "アラネオ", type: "interval", value: 24, area: "墓地地下 1 階", color: "red" },
            { lv: 80, name: "アンドゥミエル", type: "interval", value: 24, area: "実験体研究室", color: "red" },
            { lv: 80, name: "サピルス", type: "weekly", schedule: [{ day: 0, time: "18:00" }, { day: 2, time: "12:30" }], area: "月光の束縛", color: "red" },
            { lv: 80, name: "ネウトロ", type: "weekly", schedule: [{ day: 2, time: "20:00" }, { day: 4, time: "12:30" }], area: "愛情の決戦", color: "red" },
            { lv: 85, name: "レディ・ダリア", type: "interval", value: 18, area: "血染めの陰", color: "red" },
            { lv: 85, name: "将軍アクレウス", type: "interval", value: 29, area: "墓地地下 2 階", color: "red" },
            { lv: 85, name: "テュメレ", type: "weekly", schedule: [{ day: 1, time: "20:00" }, { day: 3, time: "12:30" }], area: "暴走の痕跡", color: "red" },
            { lv: 88, name: "アメンティス", type: "interval", value: 29, area: "石灰岩の岬", color: "red" },
            { lv: 88, name: "ブラウドモア", type: "interval", value: 32, area: "蔓薔薇の橋", color: "red" },
            { lv: 90, name: "ミラベ", type: "weekly", schedule: [{ day: 6, time: "16:00" }], area: "墓地地下 3 階", color: "red" },
            { lv: 93, name: "ワニタス", type: "interval", value: 48, area: "罠の沼地", color: "red" },
            { lv: 93, name: "メトゥス", type: "interval", value: 48, area: "追従者の野原", color: "red" },
            { lv: 93, name: "デュプリカン", type: "interval", value: 48, area: "操り人形の玉座", color: "red" },
            { lv: 95, name: "シュライヤー", type: "interval", value: 35, area: "猟犬の仮面劇", color: "red" },
            { lv: 95, name: "リンゴル", type: "weekly", schedule: [{ day: 6, time: "18:00" }], area: "松明街道", color: "red" },
            { lv: 95, name: "ロデリック", type: "weekly", schedule: [{ day: 5, time: "20:00" }], area: "ガルバナ地下水路 1 階", color: "red" },
            { lv: 98, name: "ガレス", type: "interval", value: 32, area: "死者の大地第 1 区域", color: "red" },
            { lv: 98, name: "ティトル", type: "interval", value: 37, area: "死者の大地第 2 区域", color: "red" },
            { lv: 98, name: "ラルバ", type: "interval", value: 35, area: "ガルバナ干拓地", color: "red" },
            { lv: 100, name: "カテナ", type: "interval", value: 35, area: "死者の大地第 3 区域", color: "red" },
            { lv: 100, name: "アウラーク", type: "weekly", schedule: [{ day: 5, time: "23:00" }, { day: 3, time: "22:00" }], area: "ガルバナ地下水路 2 階", color: "red" },
            { lv: 100, name: "セクレタ", type: "interval", value: 62, area: "カリオンの墓", color: "red" },
            { lv: 100, name: "オルド", type: "interval", value: 62, area: "後継者の楽園", color: "red" },
            { lv: 100, name: "アスタ", type: "interval", value: 62, area: "黄金血の平原", color: "red" },
            { lv: 100, name: "スポル", type: "interval", value: 62, area: "黄金血の平原", color: "red" },
            { lv: 120, name: "シャイフロック", type: "weekly", schedule: [{ day: 6, time: "23:00" }], area: "カリオンの墓", color: "red" },
            { lv: 120, name: "ベンジー", type: "weekly", schedule: [{ day: 0, time: "22:00" }], area: "復讐の巣", color: "red" },
            { lv: 130, name: "リビティーナ", type: "weekly", schedule: [{ day: 1, time: "22:00" }, { day: 6, time: "22:00" }], area: "従属の礼拝堂", color: "red" },
            { lv: 130, name: "ラカゼス", type: "weekly", schedule: [{ day: 2, time: "23:00" }, { day: 0, time: "20:00" }], area: "セクレタの刑罰", color: "red" },
            { lv: 135, name: "イカルシア", type: "weekly", schedule: [{ day: 2, time: "22:00" }, { day: 5, time: "22:00" }], area: "王家の谷", color: "red" },
            { lv: 135, name: "モティ", type: "weekly", schedule: [{ day: 3, time: "20:00" }, { day: 6, time: "20:00" }], area: "エブリンの外庭", color: "red" },
            { lv: 140, name: "ネバ", type: "weekly", schedule: [{ day: 0, time: "23:00" }], area: "セリンの中庭", color: "red" },
            { lv: 140, name: "トゥミエル", type: "weekly", schedule: [{ day: 0, time: "20:00" }], area: "ガルバナ地下水路 3 階", color: "red" },
            { lv: 60, name: "ラタン", type: "daily", times: ["12:00", "21:00"], area: "特殊出現", color: "purple" },
            { lv: 85, name: "パルト", type: "daily", times: ["12:00", "21:00"], area: "特殊出現", color: "purple" },
            { lv: 105, name: "ネドラ", type: "daily", times: ["12:00", "21:00"], area: "特殊出現", color: "purple" }
        ].map((b, i) => ({ ...b, originalIndex: i }));

        const formatToHHMM = (ts) => {
            if (!ts) return "";
            const d = new Date(ts);
            return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
        };

        const getNextWeeklyTime = (schedule) => {
            const now = new Date();
            const options = schedule.map(s => {
                let next = new Date();
                const [h, m] = s.time.split(':').map(Number);
                next.setHours(h, m, 0, 0);
                let dayDiff = s.day - now.getDay();
                if (dayDiff < 0 || (dayDiff === 0 && next < now)) dayDiff += 7;
                next.setDate(now.getDate() + dayDiff);
                return next.getTime();
            });
            return Math.min(...options);
        };

        const getNextDailyTime = (times) => {
            const now = new Date();
            const options = times.map(t => {
                let next = new Date();
                const [h, m] = t.split(':').map(Number);
                next.setHours(h, m, 0, 0);
                if (next < now) next.setDate(now.getDate() + 1);
                return next.getTime();
            });
            return Math.min(...options);
        };

        const formatCountdown = (ms, short = false) => {
            if (ms <= 0) return <span className="text-red-500 font-bold animate-pulse">出現中</span>;
            const totalSec = Math.floor(ms / 1000);
            const h = Math.floor(totalSec / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            if (short) return `${h}h ${m}m`;
            return `${h}h ${m}m ${s}s`;
        };

        const formatPredictedTime = (ts) => {
            if (!ts) return "---";
            const d = new Date(ts);
            const now = new Date();
            const isDifferentDay = d.getDate() !== now.getDate() || d.getMonth() !== now.getMonth() || d.getFullYear() !== now.getFullYear();
            const hh = String(d.getHours()).padStart(2, '0');
            const mm = String(d.getMinutes()).padStart(2, '0');
            const timeStr = `${hh}:${mm}`;
            return isDifferentDay ? `${DAYS[d.getDay()]} ${timeStr}` : timeStr;
        };

        const parseTimeInputToTimestamp = (timeStr) => {
            if (!timeStr) return null;
            let clean = timeStr.replace(/\D/g, '');
            if (clean.length === 3) clean = '0' + clean;
            if (clean.length < 4) return null;
            const h = parseInt(clean.substring(0, 2));
            const m = parseInt(clean.substring(2, 4));
            if (h >= 24 || m >= 60) return null;
            const now = new Date();
            const d = new Date();
            d.setHours(h, m, 0, 0);
            if (d.getTime() > now.getTime()) d.setDate(d.getDate() - 1);
            return d.getTime();
        };

        function App() {
            const [history, setHistory] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                return saved ? JSON.parse(saved) : {};
            });
            const [searchTerm, setSearchTerm] = useState('');
            const [sortByTime, setSortByTime] = useState(false);
            const [topLvFilter, setTopLvFilter] = useState('ALL');
            const [now, setNow] = useState(Date.now());
            const [inputStates, setInputStates] = useState({});
            const [isOnline, setIsOnline] = useState(false);

            const prevHistoryRef = useRef({});

            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        await auth.signInAnonymously();
                        setIsOnline(true);
                        const path = `artifacts/${appId}/public/data/boss_status`;
                        return db.collection(path).onSnapshot(snapshot => {
                            const data = {};
                            snapshot.forEach(doc => { data[doc.id] = doc.data(); });
                            setHistory(prev => {
                                const newHistory = { ...prev, ...data };
                                localStorage.setItem(STORAGE_KEY, JSON.stringify(newHistory));
                                return newHistory;
                            });
                        }, err => {
                            setIsOnline(false);
                        });
                    } catch (e) { setIsOnline(false); }
                };
                const unsubPromise = initFirebase();
                const interval = setInterval(() => setNow(Date.now()), 1000);
                return () => { unsubPromise.then(u => u && u()); clearInterval(interval); };
            }, []);

            useEffect(() => {
                const nextInputs = { ...inputStates };
                let changed = false;
                Object.keys(history).forEach(bossName => {
                    const currentLastKill = history[bossName]?.lastKill;
                    const prevLastKill = prevHistoryRef.current[bossName]?.lastKill;
                    if (currentLastKill !== prevLastKill || !nextInputs[bossName]) {
                        nextInputs[bossName] = formatToHHMM(currentLastKill);
                        changed = true;
                    }
                });
                if (changed) setInputStates(nextInputs);
                prevHistoryRef.current = history;
            }, [history]);

            const handleSave = async (name) => {
                const ts = parseTimeInputToTimestamp(inputStates[name]);
                if (!ts) return;
                const newData = { ...history, [name]: { lastKill: ts } };
                setHistory(newData);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(newData));
                try {
                    await db.collection(`artifacts/${appId}/public/data/boss_status`).doc(name).set({ lastKill: ts }, { merge: true });
                } catch (e) {}
            };

            const setInputToNow = (name) => {
                const d = new Date();
                const timeStr = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
                setInputStates(prev => ({ ...prev, [name]: timeStr }));
            };

            const processedBosses = useMemo(() => {
                return BOSS_DATA_RAW.map(boss => {
                    let nextSpawn = 0;
                    if (boss.type === 'interval') {
                        let last = history[boss.name]?.lastKill || 0;
                        const intervalMs = boss.value * 3600 * 1000;
                        if (last !== 0) {
                            while (last + intervalMs < now) last += intervalMs;
                            nextSpawn = last + intervalMs;
                        }
                    } else if (boss.type === 'weekly') {
                        nextSpawn = getNextWeeklyTime(boss.schedule);
                    } else if (boss.type === 'daily') {
                        nextSpawn = getNextDailyTime(boss.times);
                    }
                    return { ...boss, nextSpawn };
                });
            }, [history, now]);

            const top10Soon = useMemo(() => {
                return processedBosses
                    .filter(b => b.nextSpawn !== 0)
                    // Lv.105 ネドラのみ例外としてフィルターをかけない
                    .filter(b => topLvFilter === 'ALL' || (b.lv >= 60 && b.lv <= 100) || b.name === 'ネドラ')
                    .sort((a, b) => a.nextSpawn - b.nextSpawn)
                    .slice(0, 10);
            }, [processedBosses, topLvFilter]);

            const displayBosses = useMemo(() => {
                return processedBosses
                    .filter(b => b.name.includes(searchTerm) || b.area.includes(searchTerm))
                    .sort((a, b) => sortByTime ? (a.nextSpawn - b.nextSpawn) : (a.originalIndex - b.originalIndex));
            }, [processedBosses, searchTerm, sortByTime]);

            return (
                <div className="min-h-screen p-2 md:p-6 pb-20">
                    <div className="max-w-6xl mx-auto">
                        
                        <div className="flex flex-col md:flex-row justify-between items-center gap-4 mb-4 sticky top-0 bg-slate-950/95 py-2 z-30 shadow-md">
                            <div className="flex items-center gap-3">
                                <h1 className="text-xl font-bold text-red-500 flex items-center gap-2">
                                    <IconClock /> LORD NINE
                                </h1>
                                <div className={`w-2 h-2 rounded-full ${isOnline ? 'bg-green-500 shadow-[0_0_8px_#22c55e]' : 'bg-red-500 animate-pulse'}`}></div>
                            </div>
                            <div className="flex items-center gap-2 w-full md:w-auto">
                                <div className="relative flex-grow md:w-64">
                                    <input 
                                        type="text" 
                                        placeholder="検索..." 
                                        className="bg-slate-900 border border-slate-800 rounded-lg py-2 px-4 w-full text-sm focus:outline-none focus:ring-1 focus:ring-red-500"
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                </div>
                                <button 
                                    onClick={() => setSortByTime(!sortByTime)}
                                    className={`flex items-center gap-2 px-3 py-2 rounded-lg text-xs font-bold border transition-all ${sortByTime ? 'bg-red-600 border-red-500 text-white' : 'bg-slate-900 border-slate-700 text-slate-400'}`}
                                >
                                    {sortByTime ? "出現順" : "リスト順"}
                                </button>
                            </div>
                        </div>

                        <div className="mb-6">
                            <div className="flex items-center justify-between mb-3 px-1">
                                <div className="flex items-center gap-2">
                                    <IconFlame />
                                    <h2 className="text-xs font-bold text-slate-400">直近 10 体</h2>
                                </div>
                                <div className="flex gap-1 bg-slate-900 p-1 rounded-lg border border-slate-800">
                                    {['ALL', '60-100'].map(f => (
                                        <button key={f} onClick={() => setTopLvFilter(f)} className={`px-2 py-1 rounded text-[10px] font-bold ${topLvFilter === f ? 'bg-red-600' : 'text-slate-500'}`}>{f}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="grid grid-cols-2 sm:grid-cols-5 gap-2 md:gap-3">
                                {top10Soon.map((boss, index) => {
                                    const diff = boss.nextSpawn - now;
                                    const active = diff <= 0;
                                    return (
                                        <div key={`top-${boss.name}`} className={`relative p-2.5 rounded-xl border transition-all ${active ? 'bg-red-950/40 border-red-500 animate-pulse' : 'bg-slate-900/50 border-slate-800'}`}>
                                            <div className="absolute -top-1.5 -left-1.5 w-4 h-4 bg-slate-800 border border-slate-700 rounded-full flex items-center justify-center text-[8px] font-bold text-slate-400 shadow-lg z-10">
                                                {index + 1}
                                            </div>
                                            <div className="flex justify-between items-center mb-1">
                                                <span className="text-[9px] text-slate-400 font-mono font-bold bg-slate-950/50 px-1 rounded">{formatCountdown(diff, true)}</span>
                                                <span className={`text-[9px] font-bold ${boss.color === 'purple' ? 'text-purple-400' : 'text-red-400'}`}>Lv.{boss.lv}</span>
                                            </div>
                                            <div className="font-bold text-xs md:text-sm truncate text-white leading-tight mb-1">{boss.name}</div>
                                            <div className="text-sm md:text-base font-mono font-bold text-slate-100 flex items-center gap-1.5 mt-1 border-t border-white/5 pt-1">
                                                <IconClock color={active ? "#ef4444" : "#94a3b8"} size={12} />
                                                {formatPredictedTime(boss.nextSpawn)}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        <div className="overflow-x-auto bg-slate-900 rounded-xl border border-slate-800 shadow-2xl">
                            <table className="w-full text-left border-collapse min-w-[680px]">
                                <thead className="bg-slate-950/50 border-b border-slate-800 text-slate-500 text-[10px] font-bold uppercase tracking-wider">
                                    <tr>
                                        <th className="px-2 py-3 w-8 text-center">No.</th>
                                        <th className="px-2 py-3">Lv / 名前</th>
                                        <th className="px-2 py-3 text-center w-[220px]">討伐時間入力</th>
                                        <th className="px-2 py-3 text-center">予想時間</th>
                                        <th className="px-2 py-3 text-right">出現場所</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {displayBosses.map((boss, index) => {
                                        const diff = boss.nextSpawn - now;
                                        const active = boss.nextSpawn !== 0 && diff <= 0;
                                        return (
                                            <tr key={boss.name} className={`border-b border-slate-800/50 hover:bg-slate-800/30 transition-colors ${active ? 'bg-red-950/20' : ''}`}>
                                                <td className="px-2 py-2.5 text-[10px] font-mono text-slate-600 text-center">
                                                    {sortByTime ? index + 1 : boss.originalIndex + 1}
                                                </td>
                                                <td className="px-2 py-2.5">
                                                    <div className="flex items-center gap-1.5">
                                                        <span className={`text-[9px] px-1 rounded font-mono font-bold ${boss.color === 'purple' ? 'bg-purple-500/20 text-purple-400' : 'bg-red-500/20 text-red-400'}`}>{boss.lv}</span>
                                                        <span className={`font-bold text-xs md:text-sm whitespace-nowrap ${active ? 'text-red-400' : ''}`}>{boss.name}</span>
                                                    </div>
                                                </td>
                                                <td className="px-2 py-2.5">
                                                    <div className="flex items-center justify-center gap-1">
                                                        {boss.type === 'interval' ? (
                                                            <>
                                                                <button onClick={() => setInputToNow(boss.name)} className="bg-slate-800 hover:bg-slate-700 text-slate-300 text-[9px] px-1.5 py-1.5 rounded transition-all btn-active border border-slate-700 whitespace-nowrap shrink-0"><IconSword /></button>
                                                                <input 
                                                                    type="text" inputmode="numeric" placeholder="0000"
                                                                    className="bg-slate-800 border border-slate-700 rounded px-1 py-1.5 text-xs w-14 text-slate-100 text-center font-mono cursor-pointer shrink-0"
                                                                    value={inputStates[boss.name] || ""} onFocus={(e) => e.target.select()} onClick={(e) => e.target.select()}
                                                                    onChange={(e) => setInputStates(prev => ({ ...prev, [boss.name]: e.target.value }))}
                                                                    onKeyDown={(e) => { if(e.key === 'Enter') handleSave(boss.name); }}
                                                                />
                                                                <button onClick={() => handleSave(boss.name)} className="bg-red-600 hover:bg-red-500 text-white text-[9px] px-2 py-1.5 rounded transition-all btn-active font-bold shadow-md shrink-0">保存</button>
                                                            </>
                                                        ) : (
                                                            <div className="text-[9px] text-slate-600 italic font-mono">固定時刻</div>
                                                        )}
                                                    </div>
                                                </td>
                                                <td className="px-2 py-2.5 text-center">
                                                    <span className={`text-sm md:text-base font-mono font-bold whitespace-nowrap ${active ? 'text-red-400' : 'text-slate-200'}`}>
                                                        {formatPredictedTime(boss.nextSpawn)}
                                                    </span>
                                                </td>
                                                <td className="px-2 py-2.5 text-right">
                                                    <div className="flex items-center justify-end gap-1 whitespace-nowrap text-[10px] text-slate-500">
                                                        <IconMap /> {boss.area}
                                                    </div>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>

                        <div className="mt-6 text-[10px] text-slate-600 flex justify-between opacity-50 px-1 border-t border-slate-800 pt-4">
                            <p>※ ネドラ(Lv.105)はフィルターに関わらず常に表示されるように修正しました。</p>
                            <p className="font-mono italic uppercase">L9 Tracker v2.4.6</p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
