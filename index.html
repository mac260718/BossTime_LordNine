                                            </div>
                                            <div className="text-xs text-slate-400 flex items-center gap-1 mb-3"><IconMap size={12} color="#94a3b8" /> {editingBoss.bigArea} / {editingBoss.area}</div>
                                            <div className="flex justify-between items-center">
                                                <div className="text-[10px] text-orange-500 font-bold bg-orange-500/10 px-2 py-1 rounded border border-orange-500/20">{editingBoss.type === 'interval' ? `周期: ${editingBoss.tempInterval}h` : '定時ボス'}</div>
                                                <div className="flex items-center gap-2">{editingBoss.isAutoUpdated && <span className="text-[9px] font-bold text-red-500 uppercase">Auto</span>}{formatCountdown((editingBoss.eventTime || editingBoss.nextSpawn) - now)}</div>
                                            </div>
                                        </div>
                                        <div className="p-4 overflow-y-auto scrollbar-hide">
                                            {editingBoss.type === 'interval' ? (
                                                <div className="mb-4">
                                                    <div className="flex justify-between items-end mb-1"><label className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">討伐時間を入力</label><span className="text-[8px] text-slate-600 font-bold italic">例: 5/10 11:00</span></div>
                                                    <input 
                                                        type="text" 
                                                        inputMode="numeric"
                                                        className="bg-slate-950 border-2 border-slate-700 focus:border-red-500 rounded-xl text-xl font-mono text-center w-full py-2 text-slate-100 outline-none" 
                                                        value={editingBoss.tempTime} 
                                                        placeholder="00:00 (日付指定可)" 
                                                        onChange={(e) => handleSafeTimeInput(e.target.value, (v) => setEditingBoss(prev => ({ ...prev, tempTime: v })))} 
                                                        onKeyDown={(e) => e.key === 'Enter' && handleSaveRecord()} 
                                                    />
                                                    <div className="grid grid-cols-2 gap-2 mt-4"><button onClick={() => setEditingBoss(p => ({ ...p, tempTime: formatToHHMM(Date.now()) }))} className="bg-slate-800 hover:bg-slate-700 text-slate-200 font-bold py-2.5 rounded-xl border border-slate-700 text-xs transition-colors">現在時刻</button><button onClick={handleSaveRecord} className="bg-red-600 hover:bg-red-500 text-white font-bold py-2.5 rounded-xl shadow-lg text-xs transition-colors">保存</button></div>
                                                </div>
                                            ) : (
                                                <div className="mb-4 p-3 bg-slate-950/50 rounded-xl border border-slate-800 border-dashed text-center">
                                                    <div className="text-[10px] text-slate-500 font-bold uppercase mb-2 tracking-widest">出現スケジュール</div>
                                                    <div className="text-xs text-slate-400 leading-relaxed font-mono">{editingBoss.type === 'weekly' ? editingBoss.currentWeeklySchedule.map(s => `${DAYS[s.day]} ${s.time}`).join(', ') : editingBoss.currentDailyTimes.join(', ')}</div>
                                                </div>
                                            )}
                                            <button onClick={() => setEditingBoss(null)} className="w-full bg-[#1e293b] hover:bg-[#334155] text-white font-bold py-3 rounded-xl text-sm transition-colors border border-slate-700/50 shadow-inner">閉じる</button>
                                        </div>
                                    </div>
                                ) : editingBoss.view === 'history' ? (
                                    <div className="flex flex-col overflow-hidden h-full">
                                        <div className="p-4 border-b border-slate-800 bg-slate-900/50 flex-shrink-0 flex items-center gap-2"><IconHistory size={18} color="#94a3b8" /><h3 className="font-bold text-white text-base">更新履歴: {editingBoss.name}</h3></div>
                                        <div className="p-4 overflow-y-auto scrollbar-hide flex-grow">
                                            <div className="space-y-1 mb-6">
                                                {(!editingBoss.historyLog || editingBoss.historyLog.length === 0) ? (<div className="text-center py-10 text-slate-600 text-xs font-bold uppercase tracking-widest">記録なし</div>) : (
                                                    editingBoss.historyLog.map((log, i) => (
                                                        <div key={i} className="flex justify-between items-center bg-slate-950/50 p-3 rounded-lg border border-slate-800/50 group"><div className="flex flex-col"><span className="text-[10px] text-slate-500 font-bold uppercase">{log.isMaint ? 'メンテ終了' : '討伐時間'}</span><span className="text-base font-mono font-bold text-orange-400">{formatToMDHM(log.timestamp + (log.isMaint ? (editingBoss.currentCycle * 3600000) : 0))}</span></div><div className="flex items-center gap-3"><div className="text-right"><span className="text-[9px] text-slate-600 block">記録日時</span><span className="text-[10px] text-slate-400 font-mono">{formatToHHMM(log.recordedAt)}</span></div><button onClick={() => handleDeleteHistory(i)} className="p-2 text-slate-700 hover:text-red-500 bg-slate-900/50 hover:bg-red-500/10 rounded-lg transition-all"><IconTrash size={14} /></button></div></div>
                                                    ))
                                                )}
                                            </div>
                                            <button onClick={() => setEditingBoss(p => ({ ...p, view: 'record' }))} className="w-full bg-slate-800 py-3 rounded-xl text-xs font-bold transition-all">戻る</button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex flex-col overflow-hidden max-h-full">
                                        <div className="p-4 border-b border-slate-800 bg-slate-900/50 flex-shrink-0 flex items-center gap-2"><IconSettings size={16} color="#f97316" /><h3 className="font-bold text-white text-base">出現設定: {editingBoss.name}</h3></div>
                                        <div className="p-4 overflow-y-auto scrollbar-hide">
                                            {editingBoss.type === 'interval' ? (
                                                <div className="mb-6"><label className="text-[10px] text-slate-500 font-bold mb-2 block uppercase tracking-wider">出現周期 (時間)</label><div className="relative"><input type="number" min="0.5" step="0.5" className="bg-slate-950 border-2 border-slate-800 focus:border-orange-500 rounded-xl text-xl font-mono text-center w-full py-3 text-orange-400 outline-none" value={editingBoss.tempInterval} onChange={(e) => setEditingBoss(p => ({ ...p, tempInterval: e.target.value }))} /><span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-600 font-bold text-sm">h</span></div></div>
                                            ) : editingBoss.type === 'weekly' ? (
                                                <div className="mb-6"><label className="text-[10px] text-slate-500 font-bold mb-2 block uppercase tracking-wider">週間スケジュール</label><div className="space-y-2">{editingBoss.tempWeeklySchedule.map((slot, i) => (<div key={i} className="flex gap-1 items-center bg-slate-950 p-2 rounded-lg border border-slate-800"><select className="bg-slate-900 text-xs px-1 py-1 rounded border border-slate-700 outline-none flex-grow" value={slot.day} onChange={(e) => setEditingBoss(p => ({ ...p, tempWeeklySchedule: p.tempWeeklySchedule.map((s, idx) => idx === i ? { ...s, day: parseInt(e.target.value) } : s) }))}>{DAYS.map((d, di) => <option key={di} value={di}>{d}</option>)}</select><input type="text" inputMode="numeric" placeholder="00:00" className="bg-slate-900 text-xs px-2 py-1 rounded border border-slate-700 w-20 font-mono outline-none" value={slot.time} onChange={(e) => setEditingBoss(p => ({ ...p, tempWeeklySchedule: p.tempWeeklySchedule.map((s, idx) => idx === i ? { ...s, time: e.target.value } : s) }))} /><button onClick={() => setEditingBoss(p => ({ ...p, tempWeeklySchedule: p.tempWeeklySchedule.filter((_, idx) => idx !== i) }))} className="p-1.5 text-slate-600 hover:text-red-500 transition-colors"><IconTrash size={12}/></button></div>))}<button onClick={() => setEditingBoss(p => ({ ...p, tempWeeklySchedule: [...p.tempWeeklySchedule, { day: 0, time: "00:00" }] }))} className="w-full py-2 border border-dashed border-slate-700 rounded-lg text-[10px] font-bold text-slate-500 hover:bg-slate-800 transition-colors flex items-center justify-center gap-1"><IconPlus size={10} /> スケジュール追加</button></div></div>
                                            ) : (
                                                <div className="mb-6"><label className="text-[10px] text-slate-500 font-bold mb-2 block uppercase tracking-wider">日間スケジュール (時間)</label><div className="space-y-2">{editingBoss.tempDailyTimes.map((time, i) => (<div key={i} className="flex gap-1 items-center bg-slate-950 p-2 rounded-lg border border-slate-800"><input type="text" inputMode="numeric" placeholder="00:00" className="bg-slate-900 text-xs px-2 py-1 rounded border border-slate-700 w-full font-mono outline-none text-center" value={time} onChange={(e) => setEditingBoss(p => ({ ...p, tempDailyTimes: p.tempDailyTimes.map((t, idx) => idx === i ? e.target.value : t) }))} /><button onClick={() => setEditingBoss(p => ({ ...p, tempDailyTimes: p.tempDailyTimes.filter((_, idx) => idx !== i) }))} className="p-1.5 text-slate-600 hover:text-red-500 transition-colors"><IconTrash size={12}/></button></div>))}<button onClick={() => setEditingBoss(p => ({ ...p, tempDailyTimes: [...p.tempDailyTimes, "00:00"] }))} className="w-full py-2 border border-dashed border-slate-700 rounded-lg text-[10px] font-bold text-slate-500 hover:bg-slate-800 transition-colors flex items-center justify-center gap-1"><IconPlus size={10} /> 時間を追加</button></div></div>
                                            )}
                                            <div className="grid grid-cols-2 gap-2 mt-4 flex-shrink-0"><button onClick={closeBossSettings} className="bg-slate-800 hover:bg-slate-700 text-slate-200 font-bold py-3 rounded-xl border border-slate-700 text-xs transition-colors">戻る</button><button onClick={handleSaveSettings} className="bg-orange-600 hover:bg-orange-500 text-white font-bold py-3 rounded-xl shadow-lg text-xs transition-colors active:scale-95">保存</button></div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {bossModal && (
                        <div className="fixed inset-0 z-[180] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md modal-enter">
                            <div className="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-[360px] max-h-[92vh] overflow-y-auto scrollbar-hide p-6 shadow-2xl">
                                <h3 className="text-lg font-bold mb-6 text-white">ボス追加</h3>
                                <div className="space-y-3 mb-8">
                                    <input
                                        type="text"
                                        className="bg-slate-950 border border-slate-800 rounded-xl w-full p-3 text-sm outline-none focus:border-orange-500"
                                        value={bossModal.name}
                                        onChange={(e) => setBossModal({ ...bossModal, name: e.target.value })}
                                        placeholder="ボス名"
                                    />
                                    <div className="grid grid-cols-2 gap-2 rounded-xl border border-slate-800 bg-slate-950 p-1">
                                        <button
                                            onClick={() => setBossModal({ ...bossModal, spawnType: "interval" })}
                                            className={`py-2 rounded-lg text-xs font-bold transition-colors ${bossModal.spawnType !== "daily" ? 'bg-orange-600 text-white' : 'text-slate-500 hover:text-slate-200'}`}
                                        >
                                            周期
                                        </button>
                                        <button
                                            onClick={() => setBossModal({ ...bossModal, spawnType: "daily", scheduleMode: bossModal.scheduleMode || "daily", weeklyDay: bossModal.weeklyDay || "0", weeklySchedule: getBossModalWeeklySchedule(bossModal) })}
                                            className={`py-2 rounded-lg text-xs font-bold transition-colors ${bossModal.spawnType === "daily" ? 'bg-orange-600 text-white' : 'text-slate-500 hover:text-slate-200'}`}
                                        >
                                            定時
                                        </button>
                                    </div>
                                    {bossModal.spawnType === "daily" && (
                                        <div className="grid grid-cols-2 gap-2 rounded-xl border border-slate-800 bg-slate-950 p-1">
                                            <button
                                                onClick={() => setBossModal({ ...bossModal, scheduleMode: "daily" })}
                                                className={`py-2 rounded-lg text-xs font-bold transition-colors ${bossModal.scheduleMode !== "weekly" ? 'bg-orange-600 text-white' : 'text-slate-500 hover:text-slate-200'}`}
                                            >
                                                毎日
                                            </button>
                                            <button
                                                onClick={() => setBossModal({ ...bossModal, scheduleMode: "weekly", weeklyDay: bossModal.weeklyDay || "0", weeklySchedule: getBossModalWeeklySchedule(bossModal) })}
                                                className={`py-2 rounded-lg text-xs font-bold transition-colors ${bossModal.scheduleMode === "weekly" ? 'bg-orange-600 text-white' : 'text-slate-500 hover:text-slate-200'}`}
                                            >
                                                曜日指定
                                            </button>
                                        </div>
                                    )}
                                    <div className={`grid gap-3 ${bossModal.spawnType === "daily" && bossModal.scheduleMode === "weekly" ? 'grid-cols-1' : 'grid-cols-2'}`}>
                                        <input
                                            type="number"
                                            inputMode="numeric"
                                            min="1"
                                            className="bg-slate-950 border border-slate-800 rounded-xl w-full p-3 text-sm outline-none focus:border-orange-500"
                                            value={bossModal.lv}
                                            onChange={(e) => setBossModal({ ...bossModal, lv: e.target.value })}
                                            placeholder="Lv"
                                        />
                                        {bossModal.spawnType === "daily" && bossModal.scheduleMode !== "weekly" ? (
                                            <input
                                                type="text"
                                                inputMode="numeric"
                                                className="bg-slate-950 border border-slate-800 rounded-xl w-full p-3 text-sm outline-none focus:border-orange-500"
                                                value={bossModal.times}
                                                onChange={(e) => setBossModal({ ...bossModal, times: e.target.value })}
                                                placeholder="12:00 18:00"
                                            />
                                        ) : bossModal.spawnType !== "daily" ? (
                                            <div className="relative">
                                                <input
                                                    type="number"
                                                    inputMode="decimal"
                                                    min="0.5"
                                                    step="0.5"
                                                    className="bg-slate-950 border border-slate-800 rounded-xl w-full p-3 pr-8 text-sm outline-none focus:border-orange-500"
                                                    value={bossModal.value}
                                                    onChange={(e) => setBossModal({ ...bossModal, value: e.target.value })}
                                                    placeholder="周期"
                                                />
                                                <span className="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-bold text-slate-600">h</span>
                                            </div>
                                        ) : null}
                                    </div>
                                    {bossModal.spawnType === "daily" && bossModal.scheduleMode === "weekly" && (() => {
                                        const schedule = getBossModalWeeklySchedule(bossModal);
                                        return (
                                            <div className="space-y-2">
                                                {schedule.map((slot, i) => (
                                                    <div key={`new-boss-schedule-${i}`} className="flex gap-1.5 items-center bg-slate-950 p-2 rounded-xl border border-slate-800">
                                                        <select
                                                            className="bg-slate-900 text-xs px-2 py-2 rounded-lg border border-slate-700 outline-none flex-1 min-w-0"
                                                            value={slot.day}
                                                            onChange={(e) => setBossModal(p => {
                                                                const nextSchedule = getBossModalWeeklySchedule(p);
                                                                return { ...p, weeklySchedule: nextSchedule.map((s, idx) => idx === i ? { ...s, day: parseInt(e.target.value, 10) } : s) };
                                                            })}
                                                        >
                                                            {DAYS.map((day, index) => <option key={day} value={index}>{day}曜日</option>)}
                                                        </select>
                                                        <input
                                                            type="text"
                                                            inputMode="numeric"
                                                            placeholder="00:00"
                                                            className="bg-slate-900 text-xs px-2 py-2 rounded-lg border border-slate-700 w-24 font-mono outline-none focus:border-orange-500"
                                                            value={slot.time}
                                                            onChange={(e) => setBossModal(p => {
                                                                const nextSchedule = getBossModalWeeklySchedule(p);
                                                                return { ...p, weeklySchedule: nextSchedule.map((s, idx) => idx === i ? { ...s, time: e.target.value } : s) };
                                                            })}
                                                        />
                                                        <button
                                                            type="button"
                                                            aria-label="スケジュールを削除"
                                                            title="スケジュールを削除"
                                                            onClick={() => setBossModal(p => {
                                                                const nextSchedule = getBossModalWeeklySchedule(p);
                                                                return { ...p, weeklySchedule: nextSchedule.length <= 1 ? nextSchedule : nextSchedule.filter((_, idx) => idx !== i) };
                                                            })}
                                                            disabled={schedule.length <= 1}
                                                            className="w-9 h-9 rounded-lg flex items-center justify-center text-slate-500 hover:text-red-400 hover:bg-red-950/30 disabled:opacity-30 disabled:hover:bg-transparent disabled:hover:text-slate-500 transition-colors shrink-0"
                                                        >
                                                            <IconTrash size={13} />
                                                        </button>
                                                    </div>
                                                ))}
                                                <button
                                                    type="button"
                                                    onClick={() => setBossModal(p => ({ ...p, weeklySchedule: [...getBossModalWeeklySchedule(p), { day: 0, time: "00:00" }] }))}
                                                    className="w-full py-2.5 border border-dashed border-slate-700 rounded-xl text-[10px] font-bold text-slate-500 hover:bg-slate-800 transition-colors flex items-center justify-center gap-1"
                                                >
                                                    <IconPlus size={10} /> スケジュール追加
                                                </button>
                                            </div>
                                        );
                                    })()}
                                    <input
                                        type="text"
                                        className="bg-slate-950 border border-slate-800 rounded-xl w-full p-3 text-sm outline-none focus:border-orange-500"
                                        value={bossModal.bigArea}
                                        onChange={(e) => setBossModal({ ...bossModal, bigArea: e.target.value })}
                                        placeholder="地域（未入力ならカスタム）"
                                    />
                                    <input
                                        type="text"
                                        className="bg-slate-950 border border-slate-800 rounded-xl w-full p-3 text-sm outline-none focus:border-orange-500"
                                        value={bossModal.area}
                                        onChange={(e) => setBossModal({ ...bossModal, area: e.target.value })}
                                        placeholder="詳細エリア（未入力なら未設定）"
                                    />
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => setBossModal(null)} className="bg-slate-800 hover:bg-slate-700 py-3 rounded-xl text-xs font-bold transition-colors">キャンセル</button>
                                    <button onClick={handleSaveCustomBoss} className="bg-orange-600 hover:bg-orange-500 py-3 rounded-xl text-xs font-bold active:scale-95 shadow-lg transition-colors">追加</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {linkModal && (
                        <div className="fixed inset-0 z-[180] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md modal-enter">
                            <div className="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-[340px] p-6 shadow-2xl">
                                <h3 className="text-lg font-bold mb-6 text-white">{linkModal.mode === 'add' ? 'サイト追加' : 'サイト編集'}</h3>
                                <div className="space-y-4 mb-8">
                                    <input
                                        type="text"
                                        className="bg-slate-950 border border-slate-800 rounded-xl w-full p-3 text-sm outline-none focus:border-red-500"
                                        value={linkModal.name}
                                        onChange={(e) => setLinkModal({ ...linkModal, name: e.target.value })}
                                        placeholder="サイト名"
                                    />
                                    <input
                                        type="text"
                                        inputMode="url"
                                        className="bg-slate-950 border border-slate-800 rounded-xl w-full p-3 text-sm outline-none focus:border-red-500"
                                        value={linkModal.url}
                                        onChange={(e) => setLinkModal({ ...linkModal, url: e.target.value })}
                                        placeholder="URL"
                                    />
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => setLinkModal(null)} className="bg-slate-800 hover:bg-slate-700 py-3 rounded-xl text-xs font-bold transition-colors">キャンセル</button>
                                    <button onClick={handleSaveLink} className="bg-red-600 hover:bg-red-500 py-3 rounded-xl text-xs font-bold active:scale-95 shadow-lg transition-colors">保存</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Maintenance Reset Modal */}
                    {isMaintResetOpen && (
                        <div className="fixed inset-0 z-[200] flex items-start justify-center p-4 bg-black/90 backdrop-blur-md pt-24 modal-enter">
                            <div className="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-[340px] overflow-hidden shadow-2xl p-6">
                                <div className="flex items-center gap-3 mb-4 text-orange-500"><IconTool size={24} /><h3 className="font-bold text-white text-lg">メンテナンス・リセット</h3></div>
                                <p className="text-xs text-slate-400 mb-6 leading-relaxed">指定した時刻に<b>全てのボスが出現</b>するように設定します。<br/>※定時ボスは影響を受けません。</p>
                                <div className="mb-6">
                                    <label className="text-[10px] text-slate-500 font-bold mb-1 block uppercase tracking-widest">メンテ終了時刻 (HH:MM)</label>
                                    <input type="text" inputMode="numeric" className="bg-slate-950 border-2 border-slate-700 focus:border-orange-500 rounded-xl text-3xl font-mono text-center w-full py-3 text-orange-400 outline-none" value={maintInput} placeholder="14:00" onChange={(e) => handleSafeTimeInput(e.target.value, setMaintTime)} />
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => setIsMaintResetOpen(false)} className="bg-slate-800 hover:bg-slate-700 text-slate-200 font-bold py-3 rounded-xl text-xs transition-colors shadow-inner">キャンセル</button>
                                    <button onClick={handleMaintReset} className="bg-orange-600 hover:bg-orange-500 text-white font-bold py-3 rounded-xl shadow-lg text-xs transition-colors active:scale-95">リセット実行</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
